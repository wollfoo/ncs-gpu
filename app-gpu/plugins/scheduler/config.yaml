# GPU Scheduler Configuration
# OPUS-GPU v2.0 - Orchestration Layer

# Scheduling algorithm
# Options: fifo, priority, fair, deadline, affinity
algorithm: priority

# Maximum concurrent tasks
max_concurrent: 16

# Scheduling interval (how often to check for new tasks)
schedule_interval: 500ms

# GPU Resources
gpu_count: 4
memory_fraction: 0.9  # Use 90% of GPU memory

# Load Balancing
load_balance_strategy: least-loaded  # Options: round-robin, least-loaded
enable_work_stealing: true

# Fault Tolerance
enable_checkpointing: true
checkpoint_interval: 5m
max_retries: 3

# Retry Policy
retry:
  base_delay: 1s
  max_delay: 30s
  backoff_factor: 2.0
  retryable_errors:
    - RESOURCE_UNAVAILABLE
    - TIMEOUT
    - NETWORK_ERROR
    - GPU_OOM

# Resource Allocation
resource:
  allocation_strategy: best-fit  # Options: first-fit, best-fit, worst-fit
  reservation_timeout: 5m
  exclusive_gpu_mode: false

# Worker Configuration
workers:
  heartbeat_interval: 10s
  health_check_timeout: 30s
  max_failures_before_unhealthy: 3

# Backpressure Control
backpressure:
  enabled: true
  load_threshold: 0.8  # Throttle at 80% load
  max_queue_size: 100
  
# Performance Monitoring
monitoring:
  metrics_interval: 10s
  enable_profiling: true
  profile_output_dir: /tmp/opus-gpu/profiles

# Runtime Configuration
runtime:
  config_path: ../../core/config.toml
  
# Logging
log_level: info  # Options: debug, info, warn, error
log_format: json
log_output: stdout

# API Server (for task submission)
api:
  enabled: true
  host: 0.0.0.0
  port: 8080
  max_request_size: 10MB

# Security
security:
  enable_tls: false
  cert_file: ""
  key_file: ""
  
# Distributed Coordination (optional)
coordination:
  mode: standalone  # Options: standalone, raft, etcd
  # Raft configuration (if mode: raft)
  raft:
    node_id: node1
    peers:
      - node2:8081
      - node3:8082
    election_timeout: 150ms
    heartbeat_timeout: 50ms
    
  # Etcd configuration (if mode: etcd) 
  etcd:
    endpoints:
      - localhost:2379
    dial_timeout: 5s
    
# Task Priorities
priorities:
  low: 0
  normal: 100
  high: 150
  critical: 200
  
# Fair Queue Shares (if using fair scheduling)
fair_queue:
  default_share: 1.0
  user_shares:
    admin: 2.0
    batch: 0.5
    
# GPU Affinity Rules
affinity:
  enable_numa_binding: true
  prefer_local_memory: true
  
# Deadline Scheduling
deadline:
  slack_time: 10s  # Buffer time for deadline tasks
  preemption_enabled: false
  
# Debug Options
debug:
  enable_trace: false
  dump_task_graph: false
  simulate_failures: false
