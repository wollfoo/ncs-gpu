# Kubernetes Deployment for OPUS-GPU
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opus-gpu
  namespace: opus-system
  labels:
    app: opus-gpu
    component: core
    version: v2.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: opus-gpu
      component: core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: opus-gpu
        component: core
        version: v2.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: opus-gpu
      
      # Node selector for GPU nodes
      nodeSelector:
        node.kubernetes.io/gpu: "true"
        
      # Tolerations for GPU nodes
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
        
      # Anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - opus-gpu
              topologyKey: kubernetes.io/hostname
              
      initContainers:
      # Initialize GPU drivers
      - name: nvidia-driver-installer
        image: nvidia/cuda:12.0-base
        command: ["/bin/sh", "-c"]
        args:
        - |
          nvidia-smi
          echo "GPU drivers initialized"
        resources:
          limits:
            nvidia.com/gpu: 1
            
      containers:
      - name: opus-gpu-core
        image: opus-gpu/core:v2.0
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 9000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
          
        env:
        - name: RUST_LOG
          value: "info"
        - name: OPUS_ENV
          value: "production"
        - name: OPUS_CONFIG
          value: "/etc/opus/config.yaml"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: opus-secrets
              key: jwt-secret
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: opus-secrets
              key: api-key
              
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: 1
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: 1
            
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
          
        volumeMounts:
        - name: config
          mountPath: /etc/opus
          readOnly: true
        - name: cache
          mountPath: /var/cache/opus
        - name: logs
          mountPath: /var/log/opus
        - name: shm
          mountPath: /dev/shm
          
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
            
      - name: scheduler
        image: opus-gpu/scheduler:v2.0
        imagePullPolicy: Always
        
        ports:
        - name: scheduler
          containerPort: 8081
          protocol: TCP
        - name: metrics
          containerPort: 9092
          protocol: TCP
          
        env:
        - name: SCHEDULER_MODE
          value: "distributed"
        - name: ETCD_ENDPOINTS
          value: "http://etcd:2379"
          
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
            
        volumeMounts:
        - name: config
          mountPath: /etc/scheduler
          readOnly: true
          
      volumes:
      - name: config
        configMap:
          name: opus-config
      - name: cache
        emptyDir:
          sizeLimit: 10Gi
      - name: logs
        emptyDir:
          sizeLimit: 5Gi
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
          
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: opus-gpu
  namespace: opus-system
  labels:
    app: opus-gpu
    component: core
spec:
  type: LoadBalancer
  selector:
    app: opus-gpu
    component: core
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
    
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opus-gpu
  namespace: opus-system
  
---
# ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opus-gpu
rules:
- apiGroups: [""]
  resources: ["nodes", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]
  
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opus-gpu
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opus-gpu
subjects:
- kind: ServiceAccount
  name: opus-gpu
  namespace: opus-system
  
---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opus-gpu
  namespace: opus-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opus-gpu
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: gpu_utilization
      target:
        type: AverageValue
        averageValue: "75"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60
        
---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opus-gpu
  namespace: opus-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: opus-gpu
      component: core
      
---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: opus-gpu
  namespace: opus-system
spec:
  podSelector:
    matchLabels:
      app: opus-gpu
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: opus-system
    - podSelector:
        matchLabels:
          app: opus-gateway
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9000
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: opus-system
    - podSelector:
        matchLabels:
          app: etcd
    ports:
    - protocol: TCP
      port: 2379
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
