# Docker Compose file for OPUS-GPU development environment
# Includes: miner, metrics aggregator, InfluxDB, Grafana
version: '3.8'

services:
  # ============================================================================
  # GPU Miner Service
  # ============================================================================
  miner:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.miner
    container_name: opus-gpu-miner
    restart: unless-stopped

    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Environment variables
    environment:
      - RUST_LOG=info
      - GPUCTL_MINER_URL=http://localhost:8080
      - GPUCTL_MINER_GRPC_ADDR=localhost:9090

    # Volumes
    volumes:
      - ./config/miner.yaml:/etc/miner/config.yaml:ro
      - miner-logs:/var/log/miner
      - miner-data:/var/run/miner

    # Ports
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # gRPC
      - "9091:9091"   # Metrics

    # Health check
    healthcheck:
      test: ["CMD", "gpu-ctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - miner-network

  # ============================================================================
  # Metrics Aggregator Service
  # ============================================================================
  metrics-aggregator:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.miner
    container_name: opus-metrics-aggregator
    restart: unless-stopped
    command: ["/usr/local/bin/metrics-aggregator", "--config", "/etc/miner/aggregator.yaml"]

    environment:
      - MINER_URL=http://miner:8080
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=opus-gpu
      - INFLUXDB_BUCKET=metrics

    volumes:
      - ./config/aggregator.yaml:/etc/miner/aggregator.yaml:ro

    ports:
      - "9092:9091"  # Prometheus metrics

    depends_on:
      - miner
      - influxdb

    networks:
      - miner-network

  # ============================================================================
  # InfluxDB Time-Series Database
  # ============================================================================
  influxdb:
    image: influxdb:2.7-alpine
    container_name: opus-influxdb
    restart: unless-stopped

    environment:
      - INFLUXDB_DB=metrics
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD}
      - INFLUXDB_HTTP_AUTH_ENABLED=true

    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

    ports:
      - "8086:8086"

    networks:
      - miner-network

  # ============================================================================
  # Grafana Dashboard
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: opus-grafana
    restart: unless-stopped

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel

    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro

    ports:
      - "3000:3000"

    depends_on:
      - influxdb

    networks:
      - miner-network

  # ============================================================================
  # Prometheus (optional - for metrics scraping)
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: opus-prometheus
    restart: unless-stopped

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9093:9090"

    networks:
      - miner-network

# ============================================================================
# Networks
# ============================================================================
networks:
  miner-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  miner-logs:
    driver: local
  miner-data:
    driver: local
  influxdb-data:
    driver: local
  influxdb-config:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
