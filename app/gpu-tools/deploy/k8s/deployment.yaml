# Kubernetes Deployment for OPUS-GPU Miner
# deployment.yaml: Production-ready K8s deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: opus-gpu-miner
  namespace: opus-gpu
  labels:
    app: opus-gpu-miner
    version: v1.0.0
    component: mining
spec:
  replicas: 1  # Single replica for GPU-bound workload
  strategy:
    type: Recreate  # Cannot have multiple pods using same GPU
  selector:
    matchLabels:
      app: opus-gpu-miner
  template:
    metadata:
      labels:
        app: opus-gpu-miner
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # ========================================================================
      # Pod Configuration
      # ========================================================================
      restartPolicy: Always
      terminationGracePeriodSeconds: 60

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # ========================================================================
      # Init Container (Optional - GPU setup)
      # ========================================================================
      initContainers:
        - name: gpu-init
          image: nvidia/cuda:12.0-base-ubuntu22.04
          command:
            - sh
            - -c
            - |
              nvidia-smi
              echo "GPU initialization complete"
          resources:
            limits:
              nvidia.com/gpu: "1"

      # ========================================================================
      # Main Container
      # ========================================================================
      containers:
        - name: miner
          image: opus-gpu:latest
          imagePullPolicy: IfNotPresent

          # Command
          command:
            - /usr/local/bin/gpu-watchdog
          args:
            - --config
            - /etc/miner/config.yaml

          # Ports
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP

          # Environment variables
          env:
            - name: RUST_LOG
              value: "info"
            - name: GPU_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: CUDA_VISIBLE_DEVICES
              value: "all"

          # Secrets
          envFrom:
            - secretRef:
                name: opus-gpu-secrets
            - configMapRef:
                name: opus-gpu-config

          # Volume mounts
          volumeMounts:
            - name: config
              mountPath: /etc/miner
              readOnly: true
            - name: logs
              mountPath: /var/log/miner
            - name: data
              mountPath: /var/run/miner

          # Resource limits
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup probe (for slow GPU initialization)
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30  # 5 minutes total

      # ========================================================================
      # Sidecar Container - Metrics Aggregator
      # ========================================================================
        - name: metrics-aggregator
          image: opus-gpu:latest
          imagePullPolicy: IfNotPresent

          command:
            - /usr/local/bin/metrics-aggregator
          args:
            - --config
            - /etc/miner/aggregator.yaml

          ports:
            - name: metrics
              containerPort: 9092
              protocol: TCP

          env:
            - name: MINER_URL
              value: "http://localhost:8080"

          volumeMounts:
            - name: config
              mountPath: /etc/miner
              readOnly: true

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      # ========================================================================
      # Volumes
      # ========================================================================
      volumes:
        - name: config
          configMap:
            name: opus-gpu-config
            items:
              - key: miner.yaml
                path: config.yaml
              - key: aggregator.yaml
                path: aggregator.yaml

        - name: logs
          emptyDir: {}

        - name: data
          emptyDir: {}

      # ========================================================================
      # Node Affinity (Schedule on GPU nodes)
      # ========================================================================
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: accelerator
                    operator: In
                    values:
                      - nvidia-gpu

      # Tolerations for GPU nodes
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

---
# ============================================================================
# Service for miner HTTP/gRPC
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: opus-gpu-miner
  namespace: opus-gpu
  labels:
    app: opus-gpu-miner
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: metrics
      protocol: TCP
  selector:
    app: opus-gpu-miner

---
# ============================================================================
# ConfigMap
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: opus-gpu-config
  namespace: opus-gpu
data:
  miner.yaml: |
    pool:
      url: "stratum+tcp://pool.example.com:3333"
    gpu:
      devices: "all"
    monitoring:
      http_api:
        enabled: true
        port: 8080
    logging:
      level: "info"
      format: "json"

  aggregator.yaml: |
    miner_url: "http://localhost:8080"
    collect_interval: 5s
    storage_type: "memory"
    metrics_port: 9092

---
# ============================================================================
# Secret (replace with actual secrets)
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: opus-gpu-secrets
  namespace: opus-gpu
type: Opaque
stringData:
  WALLET_ADDRESS: "0xYourWalletAddress"
  API_TOKEN: "your-secret-api-token"
  INFLUXDB_TOKEN: "your-influxdb-token"
