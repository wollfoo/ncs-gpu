# OPUS-GPU Miner Configuration
# Configuration file cho GPU mining operations

# ============================================================================
# Mining Pool Configuration (Cấu hình mining pool)
# ============================================================================
pool:
  url: "stratum+tcp://pool.example.com:3333"
  backup_url: "stratum+tcp://backup-pool.example.com:3333"
  wallet: "0xYourWalletAddressHere"
  worker_name: "opus-gpu-01"
  password: "x"

# ============================================================================
# GPU Configuration (Cấu hình GPU)
# ============================================================================
gpu:
  devices: "all"  # "all" hoặc "0,1,2" để chọn specific GPUs

  # Per-GPU settings
  settings:
    - id: 0
      power_limit: 200  # Watts
      core_clock: 1500  # MHz
      memory_clock: 8000  # MHz
      fan_speed: 70  # Percentage (auto nếu không set)

    - id: 1
      power_limit: 180
      core_clock: 1450
      memory_clock: 7800
      fan_speed: 65

# ============================================================================
# Performance Tuning (Tối ưu hiệu năng)
# ============================================================================
performance:
  threads_per_gpu: 2
  intensity: "auto"  # low, medium, high, auto
  worksize: 256

  # Temperature management
  temperature:
    target: 70  # °C
    max: 85  # °C - shutdown if exceeded
    critical: 90  # °C - emergency shutdown

  # Auto-tuning
  auto_tune:
    enabled: true
    duration: 300  # seconds
    interval: 3600  # re-tune every hour

# ============================================================================
# Stealth Mode (Chế độ ẩn danh)
# ============================================================================
stealth:
  enabled: false

  # Process name obfuscation
  process:
    name: "systemd-journal"
    fake_pid: true

  # GPU usage cloaking
  gpu_cloaking:
    enabled: false
    target_utilization: 30  # Fake reported utilization

# ============================================================================
# Monitoring & Logging (Giám sát & ghi log)
# ============================================================================
monitoring:
  http_api:
    enabled: true
    host: "0.0.0.0"
    port: 8080

  grpc:
    enabled: true
    host: "0.0.0.0"
    port: 9090

  metrics:
    enabled: true
    port: 9091
    path: "/metrics"

logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json, text
  output: "/var/log/miner/output.log"

  rotation:
    enabled: true
    max_size: 100  # MB
    max_age: 7  # days
    max_backups: 5
    compress: true

# ============================================================================
# Health Check (Kiểm tra sức khỏe)
# ============================================================================
health:
  endpoint: "/health"
  interval: 10  # seconds

  checks:
    - type: "gpu_temperature"
      threshold: 85
    - type: "hashrate_drop"
      threshold: 20  # percentage
    - type: "gpu_error_rate"
      threshold: 5  # errors per minute

# ============================================================================
# Auto-Restart Configuration (Cấu hình tự động khởi động lại)
# ============================================================================
restart:
  on_gpu_error: true
  on_pool_disconnect: true
  max_restarts: 5
  restart_delay: 5  # seconds

# ============================================================================
# Security (Bảo mật)
# ============================================================================
security:
  api_token: "${API_TOKEN}"  # Load từ environment variable
  tls:
    enabled: false
    cert_file: "/etc/miner/certs/server.crt"
    key_file: "/etc/miner/certs/server.key"

  # IP whitelist cho API access
  allowed_ips:
    - "127.0.0.1"
    - "192.168.1.0/24"

# ============================================================================
# Notifications (Thông báo)
# ============================================================================
notifications:
  webhook:
    enabled: false
    url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    events:
      - "miner_started"
      - "gpu_overheat"
      - "pool_disconnect"
      - "low_hashrate"

  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from: "alerts@opus-gpu.io"
    to: "admin@example.com"
