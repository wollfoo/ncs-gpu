# GPU Optimization Default Configuration
# =======================================
# Cấu hình mặc định cho tối ưu hóa GPU
# Configuration tự động override bằng environment variables với prefix: GPU_OPT_
# Ví dụ: GPU_OPT_ENABLED=true, GPU_OPT_ORCHESTRATOR_MAX_WORKERS=8

# Metadata - Thông tin meta
metadata:
  version: "2.0.0"
  profile: "production"  # dev | staging | production
  created_at: "2025-08-11T15:45:15Z"
  author: "GPU Optimization Team"

# System settings - Cấu hình hệ thống
system:
  enabled: true
  debug_mode: false
  log_level: "INFO"  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  log_format: "json"  # json | text
  log_rotation:
    enabled: true
    max_bytes: 10485760  # 10MB
    backup_count: 5
  metrics_export:
    enabled: true
    format: "prometheus"  # prometheus | json | csv
    endpoint: "/metrics"
    port: 9090

# Orchestrator settings - Cấu hình điều phối
orchestrator:
  max_workers: 4
  min_workers: 1
  worker_timeout: 30  # seconds
  scheduling_interval: 100  # milliseconds
  scheduling_algorithm: "priority_queue"  # priority_queue | round_robin | weighted_round_robin
  priority_weights:
    performance: 0.4
    efficiency: 0.3
    temperature: 0.2
    power: 0.1
  task_queue:
    max_size: 1000
    overflow_policy: "drop_oldest"  # drop_oldest | drop_newest | block
  health_check:
    enabled: true
    interval: 10  # seconds
    timeout: 5  # seconds

# Monitoring settings - Cấu hình giám sát
monitoring:
  enabled: true
  sampling_rate: 1000  # Hz
  buffer_size: 1024
  retention_period: 3600  # seconds (1 hour)
  metrics:
    gpu_utilization: true
    memory_usage: true
    temperature: true
    power_draw: true
    clock_speeds: true
    fan_speed: true
    pcie_throughput: true
  alerts:
    enabled: true
    temperature_threshold: 85  # Celsius
    power_threshold: 320  # Watts
    utilization_threshold: 95  # Percent
    notification_channels:
      - "log"
      - "webhook"
  data_aggregation:
    enabled: true
    intervals: [1, 5, 15, 60]  # minutes
    methods: ["avg", "min", "max", "p95", "p99"]

# Strategy settings - Cấu hình chiến lược
strategies:
  default: "balanced"
  fallback: "conservative"  # Chiến lược dự phòng khi lỗi
  available:
    - "aggressive"     # Tối đa hiệu năng
    - "balanced"       # Cân bằng
    - "conservative"   # An toàn
    - "stealth"       # Ẩn danh
    - "adaptive"      # Thích ứng
    - "power_saving"  # Tiết kiệm điện
    - "thermal"       # Ưu tiên nhiệt độ
  selection_criteria:
    auto_select: true
    selection_interval: 60  # seconds
    performance_threshold: 0.8
    efficiency_threshold: 0.7
  parameters:
    aggressive:
      power_limit: 300
      clock_offset: 200
      memory_offset: 500
      fan_speed: 100
    balanced:
      power_limit: 250
      clock_offset: 100
      memory_offset: 300
      fan_speed: 80
    conservative:
      power_limit: 200
      clock_offset: 0
      memory_offset: 0
      fan_speed: 70
    stealth:
      power_limit: 180
      clock_offset: -100
      memory_offset: 0
      fan_speed: 60
      noise_threshold: 40  # dB

# Resource control settings - Cấu hình điều khiển tài nguyên
resource_control:
  enabled: true
  power_management:
    enabled: true
    power_cap_range: [100, 300]  # Watts
    power_step: 10  # Watts
    adjustment_interval: 5  # seconds
    power_profiles:
      low: 150
      medium: 200
      high: 250
      extreme: 300
  clock_management:
    enabled: true
    gpu_clock:
      min: 300  # MHz
      max: 1980  # MHz
      step: 15  # MHz
    memory_clock:
      min: 810  # MHz
      max: 10000  # MHz
      step: 50  # MHz
    auto_boost:
      enabled: true
      temperature_limit: 83  # Celsius
      power_headroom: 20  # Watts
  memory_management:
    enabled: true
    memory_bandwidth:
      min: 100  # GB/s
      max: 900  # GB/s
    allocation_strategy: "dynamic"  # static | dynamic | adaptive
    oversubscription_ratio: 1.2
  thermal_management:
    enabled: true
    target_temperature: 70  # Celsius
    max_temperature: 85  # Celsius
    throttle_temperature: 83  # Celsius
    fan_curve:
      - [30, 30]  # [temp_c, fan_percent]
      - [50, 50]
      - [70, 80]
      - [85, 100]

# Coordination settings - Cấu hình phối hợp
coordination:
  enabled: true
  semaphore_timeout: 5  # seconds
  lock_timeout: 10  # seconds
  max_concurrent_processes: 8
  process_priority_levels: 5
  deadlock_detection:
    enabled: true
    check_interval: 2  # seconds
    resolution_strategy: "rollback"  # rollback | wait | force_release
  inter_process_communication:
    protocol: "shared_memory"  # shared_memory | unix_socket | tcp
    buffer_size: 4096  # bytes
    max_message_size: 1048576  # 1MB
  distributed_coordination:
    enabled: false
    backend: "redis"  # redis | etcd | zookeeper
    connection_string: "redis://localhost:6379"
    namespace: "gpu_opt"

# Profiling settings - Cấu hình profiling
profiling:
  enabled: false  # Enable only in debug mode
  trace_depth: 3
  sampling_mode: "statistical"  # statistical | deterministic | hybrid
  sampling_rate: 0.01  # 1% for statistical mode
  output_format: "flamegraph"  # flamegraph | json | pprof
  metrics_collection:
    cpu_time: true
    gpu_time: true
    memory_allocation: true
    io_operations: true
    network_calls: false
  performance_thresholds:
    function_duration_ms: 100
    memory_allocation_mb: 100
    gpu_kernel_duration_ms: 10

# Parallel execution settings - Cấu hình thực thi song song
parallel_execution:
  enabled: true
  executor_type: "thread_pool"  # thread_pool | process_pool | async
  max_parallel_tasks: 16
  queue_size: 100
  task_timeout: 300  # seconds
  retry_policy:
    enabled: true
    max_retries: 3
    backoff_factor: 2
    max_backoff: 60  # seconds
  load_balancing:
    algorithm: "least_loaded"  # round_robin | least_loaded | random | weighted
    rebalance_interval: 30  # seconds

# Security settings - Cấu hình bảo mật
security:
  enabled: true
  authentication:
    enabled: false
    method: "token"  # token | jwt | oauth2
  authorization:
    enabled: false
    rbac_enabled: false
  encryption:
    enabled: false
    algorithm: "AES-256-GCM"
  audit_logging:
    enabled: true
    log_level: "INFO"
    include_request_body: false
    include_response_body: false

# Integration settings - Cấu hình tích hợp
integration:
  external_apis:
    enabled: false
    endpoints: []
  webhooks:
    enabled: false
    endpoints: []
    retry_policy:
      max_retries: 3
      timeout: 10  # seconds
  message_queue:
    enabled: false
    broker: "rabbitmq"  # rabbitmq | kafka | redis
    connection_string: ""

# Limits and quotas - Giới hạn và hạn ngạch
limits:
  max_optimization_duration: 3600  # seconds (1 hour)
  max_gpu_memory_usage: 0.9  # 90% of available
  max_power_draw: 350  # Watts (absolute maximum)
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst_size: 10

# Feature flags - Cờ tính năng
features:
  experimental_optimizations: false
  auto_recovery: true
  predictive_scaling: false
  machine_learning_optimization: false
  multi_gpu_support: true
  containerized_workloads: true
  kubernetes_integration: false
