apiVersion: apps/v1
kind: Deployment
metadata:
  name: opus-gpu-miner
  namespace: opus-gpu
  labels:
    app: opus-gpu
    component: miner
    version: v0.1.0
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: opus-gpu
      component: miner

  template:
    metadata:
      labels:
        app: opus-gpu
        component: miner
        version: v0.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      # Security context for pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Node selector for GPU nodes
      nodeSelector:
        nvidia.com/gpu: "true"
        node-role.kubernetes.io/gpu-worker: "true"

      # Tolerations for GPU nodes
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      # Init containers (optional - for setup tasks)
      initContainers:
        - name: config-validator
          image: busybox:latest
          command: ['sh', '-c', 'echo "Validating configuration..." && ls -la /etc/opus-gpu/']
          volumeMounts:
            - name: config
              mountPath: /etc/opus-gpu
              readOnly: true

      # Main container
      containers:
        - name: miner
          image: opus-gpu:latest
          imagePullPolicy: IfNotPresent

          # Command override (optional)
          args:
            - "--config"
            - "/etc/opus-gpu/app.toml"

          # Environment variables
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: CONFIG_PATH
              value: "/etc/opus-gpu/app.toml"
            - name: RUST_LOG
              value: "info"
            - name: LOG_PATH
              value: "/var/log/opus-gpu"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # Ports
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Resource requests and limits
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
              nvidia.com/gpu: 2  # Request 2 GPUs
            limits:
              cpu: "4"
              memory: "4Gi"
              nvidia.com/gpu: 2

          # Volume mounts
          volumeMounts:
            - name: config
              mountPath: /etc/opus-gpu
              readOnly: true
            - name: plugins
              mountPath: /app/plugins
              readOnly: true
            - name: logs
              mountPath: /var/log/opus-gpu
            - name: data
              mountPath: /app/data

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup probe (for slow-starting applications)
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

      # Volumes
      volumes:
        - name: config
          configMap:
            name: opus-gpu-config
            defaultMode: 0440

        - name: plugins
          emptyDir: {}

        - name: logs
          emptyDir: {}

        - name: data
          persistentVolumeClaim:
            claimName: opus-gpu-data-pvc

      # Restart policy
      restartPolicy: Always

      # DNS policy
      dnsPolicy: ClusterFirst

      # Termination grace period
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opus-gpu-data-pvc
  namespace: opus-gpu
  labels:
    app: opus-gpu
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard  # Adjust based on your cluster
