apiVersion: v1
kind: Secret
metadata:
  name: opus-gpu-secrets
  namespace: opus-gpu
  labels:
    app: opus-gpu
    component: secrets
type: Opaque

# NOTE: These are TEMPLATE values for demonstration
# In production, use proper secret management:
# 1. kubectl create secret generic opus-gpu-secrets --from-literal=...
# 2. Use external secret managers (Vault, AWS Secrets Manager, etc.)
# 3. Encrypt secrets at rest with KMS
# 4. Use SealedSecrets or similar for GitOps workflows

stringData:
  # API Authentication
  jwt-secret: "CHANGE-ME-IN-PRODUCTION-USE-STRONG-SECRET"
  api-token: "CHANGE-ME-IN-PRODUCTION"

  # Mining Configuration
  wallet-address: "YOUR-WALLET-ADDRESS-HERE"
  pool-password: "x"

  # Database credentials (if used)
  db-username: "opus_gpu"
  db-password: "CHANGE-ME-IN-PRODUCTION"

  # Encryption keys
  config-encryption-key: "CHANGE-ME-32-BYTE-KEY-FOR-AGE-ENCRYPTION"

  # Optional: TLS certificates (base64 encoded)
  # tls.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----
  # tls.key: |
  #   -----BEGIN PRIVATE KEY-----
  #   ...
  #   -----END PRIVATE KEY-----

---
# Example: Using secrets in deployment
# Add this to deployment.yaml containers env section:
#
# env:
#   - name: JWT_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: opus-gpu-secrets
#         key: jwt-secret
#   - name: WALLET_ADDRESS
#     valueFrom:
#       secretKeyRef:
#         name: opus-gpu-secrets
#         key: wallet-address
#   - name: API_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: opus-gpu-secrets
#         key: api-token
