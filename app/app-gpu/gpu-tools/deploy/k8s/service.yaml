apiVersion: v1
kind: Service
metadata:
  name: opus-gpu-miner
  namespace: opus-gpu
  labels:
    app: opus-gpu
    component: miner
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP

  selector:
    app: opus-gpu
    component: miner

  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

  # Session affinity (optional - for sticky sessions)
  sessionAffinity: None

  # IP family policy
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack

---
apiVersion: v1
kind: Service
metadata:
  name: opus-gpu-miner-headless
  namespace: opus-gpu
  labels:
    app: opus-gpu
    component: miner
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet or direct pod access

  selector:
    app: opus-gpu
    component: miner

  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

  publishNotReadyAddresses: true

---
apiVersion: v1
kind: Service
metadata:
  name: opus-gpu-miner-nodeport
  namespace: opus-gpu
  labels:
    app: opus-gpu
    component: miner
spec:
  type: NodePort

  selector:
    app: opus-gpu
    component: miner

  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080  # Accessible externally on this port
      protocol: TCP

    - name: metrics
      port: 9090
      targetPort: metrics
      nodePort: 30090
      protocol: TCP

  externalTrafficPolicy: Cluster
