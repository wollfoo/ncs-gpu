apiVersion: v2
name: opus-gpu
description: A Helm chart for OPUS-GPU v2.0 - High-Performance GPU Computing Platform
type: application
version: 2.0.0
appVersion: "2.0.0"

keywords:
  - gpu
  - cuda
  - high-performance-computing
  - distributed-computing
  - machine-learning

home: https://github.com/opus-gpu/opus-gpu
sources:
  - https://github.com/opus-gpu/opus-gpu

maintainers:
  - name: OPUS Team
    email: admin@opus-gpu.io
    url: https://opus-gpu.io

icon: https://opus-gpu.io/logo.png

dependencies:
  - name: prometheus
    version: 15.x.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.enabled
    
  - name: grafana
    version: 6.x.x
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.grafana.enabled
    
  - name: etcd
    version: 8.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: etcd.enabled

annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/license: Apache-2.0
  artifacthub.io/signKey: |
    fingerprint: 1234567890ABCDEF
    url: https://opus-gpu.io/pgp
