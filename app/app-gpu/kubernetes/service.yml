---
apiVersion: v1
kind: Service
metadata:
  name: gpu-miner-service
  namespace: gpu-mining-research
  labels:
    app: gpu-miner
    purpose: academic-research
  annotations:
    # Security annotations
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

    # Prometheus service discovery
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"

spec:
  type: ClusterIP  # Internal only - không expose ra ngoài
  selector:
    app: gpu-miner
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

  # No other ports exposed - academic research only
  # Không có mining RPC ports hoặc web interfaces

---
# Network Policy - extreme restrictiveness
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gpu-miner-network-policy
  namespace: gpu-mining-research
  labels:
    app: gpu-miner
    purpose: academic-research

spec:
  podSelector:
    matchLabels:
      app: gpu-miner

  policyTypes:
  - Ingress
  - Egress

  # Ingress rules - chỉ cho monitoring từ authorized pods
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          monitoring: prometheus
    - namespaceSelector:
        matchLabels:
          monitoring: grafana
    - podSelector:
        matchLabels:
          component: kube-prometheus-stack
    ports:
    - protocol: TCP
      port: 9090  # Prometheus metrics port only

  # Egress rules - minimal network access
  egress:
  # Cho phép DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Cho phép metrics gửi đến Prometheus nếu remote write
  - to:
    - namespaceSelector:
        matchLabels:
          monitoring: prometheus
    ports:
    - protocol: TCP
      port: 9090

  # Block all other traffic
  # Không cho phép internet access
  # Không cho phép communication với bất kỳ mining pools nào