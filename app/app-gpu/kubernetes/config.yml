  # AppArmor profile
  apparmor-gpu-miner: |
    #include <tunables/global>
    profile gpu-miner /app/gpu-miner flags=(attach_disconnected,mediate_deleted) {
      #include <abstractions/base>
      #include <abstractions/nameservice>
      #include <abstractions/ssl_certs>
      /app/gpu-miner r,
      /app/ r,
      /app/** rwk,
      /tmp/** rwk,
      /proc/*/stat r,
      /proc/*/maps r,
      /proc/*/status r,
      /proc/meminfo r,
      /proc/cpuinfo r,
      /dev/dri/card* rwk,
      /dev/nvidia* rwk,
      /dev/nvidiactl rwk,
      /dev/nvidia-modeset rwk,
      /dev/nvidia-uvm rwk,
      /dev/nvidia-uvm-tools rwk,
      /dev/shm/ r,
      /dev/shm/** rwk,
      /etc/passwd r,
      /etc/group r,
      /etc/nsswitch.conf r,
      /etc/localtime r,
      /usr/share/zoneinfo/** r,
      /etc/ssl/certs/ r,
      /etc/ssl/certs/** r,
      /lib/ r,
      /usr/lib/ r,
      /usr/lib/** r,
      /lib64/ r,
      /lib64/** r,
      /usr/share/vulkan/icd.d/ r,
      /usr/share/vulkan/icd.d/** r,
      /usr/share/glvnd/ r,
      /usr/share/glvnd/** r,
      /usr/lib/x86_64-linux-gnu/libnvidia-* r,
      /usr/lib/nvidia/** r,
      deny /proc/*/cmdline rw,
      deny /proc/*/environ rw,
      deny /sys/kernel/** rw,
      deny /proc/sys/kernel/** rw,
      signal (send,receive) peer=unconfined,
      set rlimit cpu <= 3600,
      set rlimit nproc <= 1024,
      set rlimit nofile <= 4096,
      set rlimit memlock <= 128M,
      deny ptrace,
      deny mount,
      deny umount,
      deny pivot_root,
      deny /bin/mount rwx,
      deny /bin/umount rwx,
      deny /var/log/** rw,
      deny /dev/mem r,
      deny /dev/kmem r,
      deny /dev/port r,
      deny /dev/hda* r,
      deny /dev/sda* r,
      deny /dev/dm-* r,
      audit deny /tmp/unknown-crypto-files w,
      audit deny /proc/crypto r,
      change_profile -> gpu-miner-child,
      capability ipc_lock,
      capability sys_resource,
      deny capability net_admin,
      deny capability net_raw,
      deny capability sys_admin,
      deny capability sys_rawio,
      deny capability mknod,
    }