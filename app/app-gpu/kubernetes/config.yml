---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-miner-config
  namespace: gpu-mining-research
  labels:
    app: gpu-miner
    component: config

data:
  # Configuration file
  config.yaml: |
    # GPU Miner Academic Research Configuration
    # Academic Security Research Framework Compliant

    application:
      name: gpu-miner
      version: v0.1.0
      mode: ai-training      # AI camouflage mode
      research_compliant: true

    gpu:
      device_id: 0
      memory_limit_mb: 4096
      temperature_threshold_celsius: 85
      power_limit_watts: 250

    mining:
      workers: 4
      difficulty: 8
      max_nonce: 4294967294
      hash_algorithm: sha256-double

    security:
      rate_limit_per_minute: 100
      input_validation: strict
      audit_logging: enabled
      camouflage_mode: enabled

    monitoring:
      prometheus_port: 9090
      metrics_interval_seconds: 15
      health_check_endpoint: /health

    # Academic research compliance
    compliance:
      purpose: defensive-security
      framework: academic-research
      export_control: no-restrictions
      data_classification: research-only

