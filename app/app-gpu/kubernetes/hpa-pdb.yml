---
# Horizontal Pod Autoscaler - GPU utilization based scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gpu-miner-hpa
  namespace: gpu-mining-research
  labels:
    app: gpu-miner
    component: autoscaling

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gpu-miner

  minReplicas: 1
  maxReplicas: 3  # Limited để tránh mining network congestion

  metrics:
  # GPU Utilization scaling (primary metric)
  - type: Pods
    pods:
      metric:
        name: gpu_utilization
        selector:
          matchLabels:
            app: gpu-miner
      target:
        type: AverageValue
        averageValue: 75  # Scale up khi GPU > 75% utilized

  # Memory threshold (secondary)
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70

  # Safety scaling: scale down if issues detected
  - type: Pods
    pods:
      metric:
        name: gpu_temperature
        selector:
          matchLabels:
            app: gpu-miner
      target:
        type: AverageValue
        averageValue: 80  # Emergency scale down if temp > 80°C

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutes trước khi scale down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Min

    scaleUp:
      stabilizationWindowSeconds: 180   # 3 minutes trước khi scale up
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      selectPolicy: Max
      # Disable scale up if high temperature
      - type: Pods
        value: 0
        periodSeconds: 60
        metric:
          name: gpu_temperature
          selector:
            matchLabels:
              app: gpu-miner
          target:
            type: AverageValue
            averageValue: 85  # No scale up if temp > 85°C

---
# Pod Disruption Budget - đảm bảo availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gpu-miner-pdb
  namespace: gpu-mining-research
  labels:
    app: gpu-miner
    component: disruption-budget

spec:
  minAvailable: 1  # Ít nhất 1 pod available
  selector:
    matchLabels:
      app: gpu-miner

  # Uncomment để dùng percentage thay vì absolute number
  # minAvailable: 66%  # 66% của total pods phải available

---
# Resource Quota - enforce academic usage limits
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gpu-mining-resource-quota
  namespace: gpu-mining-research

spec:
  hard:
    # GPU limits
    requests.nvidia.com/gpu: "2"
    limits.nvidia.com/gpu: "2"

    # CPU limits (academic research scale)
    requests.cpu: "4"
    limits.cpu: "8"

    # Memory limits
    requests.memory: 8Gi
    limits.memory: 16Gi

    # Storage limits (minimal logging)
    requests.storage: 5Gi
    persistentvolumeclaims: "2"

    # Pod/Service limits
    pods: "5"
    services: "3"
    configmaps: "10"
    secrets: "5"

---
# Limit Range - per pod limits
apiVersion: v1
kind: LimitRange
metadata:
  name: gpu-mining-limits
  namespace: gpu-mining-research

spec:
  limits:
  - default:
      cpu: 2
      memory: 4Gi
    defaultRequest:
      cpu: 1
      memory: 2Gi
    max:
      cpu: 4
      memory: 8Gi
    min:
      cpu: 500m
      memory: 1Gi
    type: Container

  - max:
      storage: 2Gi
    min:
      storage: 1Gi
    type: PersistentVolumeClaim