---
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-mining-research
  labels:
    name: gpu-mining-research
    purpose: academic-research
    security-level: high
    compliance: research-framework
spec:
  finalizers:
  - kubernetes

---
# Security Context Constraints cho GPU workloads
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: gpu-mining-scc
  namespace: gpu-mining-research
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
requiredDropCapabilities:
- ALL
allowedCapabilities:
- NET_BIND_SERVICE
defaultAddCapabilities: []
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts:
- min: 9090
  max: 9090  # Prometheus metrics port
readOnlyRootFilesystem: true
runAsUser:
  type: MustRunAsNonRoot
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
fsGroup:
  type: MustRunAs
users: []
groups: []
volumes:
- configMap
- downwardAPI
- emptyDir
- persistentVolumeClaim
- projected
- secret