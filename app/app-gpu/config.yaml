# OPUS-GPU v2.0 Configuration File

# Runtime configuration
runtime:
  workers: 4                    # Number of worker threads
  max_memory_mb: 500           # Maximum memory usage in MB
  event_queue_size: 10000      # Event queue size
  debug: false                 # Enable debug mode

# Plugin configuration
plugin:
  plugin_dir: ./plugins        # Plugin directory path
  auto_load: true             # Auto-load plugins on startup
  hot_reload: true            # Enable hot-reload

# IPC configuration
ipc:
  shared_memory_size_mb: 100   # Shared memory size in MB
  num_segments: 4              # Number of shared memory segments
  bounded_queue: true          # Use bounded queue
  queue_size: 1000            # Queue size if bounded

# GPU configuration
gpu:
  devices: [0]                 # GPU device indices to use
  memory_fraction: 0.9         # Memory fraction to allocate (0.0 - 1.0)
  power_limit: 300            # Power limit in watts (optional)
  temperature_limit: 80        # Temperature limit in Celsius (optional)

# Monitoring configuration
monitoring:
  prometheus_enabled: true     # Enable Prometheus metrics
  prometheus_port: 9090       # Prometheus port
  log_level: info             # Log level (trace, debug, info, warn, error)
  metrics_interval_secs: 30   # Metrics collection interval
  tracing_enabled: true       # Enable tracing
