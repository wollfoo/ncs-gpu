sprint: Baseline Cutover
iteration: 1
objectives:
  - Thiết lập skeleton dịch vụ control-plane và data-plane.
  - Cấu hình CI tự động build/test/SBOM.
  - Chuẩn hóa tài liệu onboarding.
backlog:
  - id: BC-1
    title: Cargo workspace bootstrap
    owner: platform
    definition_of_done:
      - cargo check passes
      - scheduler/executor health endpoint trả về 200
  - id: BC-2
    title: API gateway nền tảng
    owner: sre
    definition_of_done:
      - go test ./... passes
      - Endpoint /health được bảo vệ mTLS (placeholder)
  - id: BC-3
    title: CI multi-language pipeline
    owner: devx
    definition_of_done:
      - workflow CI xanh trên nhánh main
      - SBOM artifact xuất hiện trên build
  - id: BC-4
    title: Documentation baseline
    owner: architecture
    definition_of_done:
      - README cập nhật
      - Runbook baseline cutover hoàn thiện
  - id: BC-5
    title: Scheduler queue integration & bearer auth
    owner: platform
    status: done
    definition_of_done:
      - POST /jobs publish tới NATS với client nội bộ
      - Hỗ trợ `SCHEDULER_BEARER_TOKEN` và `NATS_AUTH_TOKEN`
  - id: BC-6
    title: Executor metrics & ACK pipeline
    owner: sre
    status: done
    definition_of_done:
      - Executor dùng `nats-lite` queue_subscribe + publish ACK
      - Prometheus metrics exposes latency, counters (`EXECUTOR_METRICS_ADDR`)
  - id: BC-7
    title: Global observability bootstrap
    owner: devx
    status: done
    definition_of_done:
      - Metrics exporter cho scheduler/executor chạy được
      - Script `tooling/scripts/bench_scheduler.sh` gửi tải đồng thời
