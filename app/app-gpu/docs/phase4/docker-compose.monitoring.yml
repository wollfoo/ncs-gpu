# Phase 4 Performance Monitoring Stack
# Docker Compose configuration for Prometheus + Grafana monitoring
# Version: 1.0
# Date: 2025-10-02

version: "3.8"

services:
  # ============================================================================
  # GPU Mining Application with Prometheus Exporter
  # ============================================================================
  mining-app:
    image: opus-gpu-mining:latest
    container_name: mining-node-1
    runtime: nvidia  # Requires NVIDIA Container Toolkit

    environment:
      # Mining configuration
      - RUST_LOG=info
      - CONFIG_PATH=/app/config/mining-config.toml

      # Prometheus exporter configuration
      - PROMETHEUS_EXPORTER_ENABLED=true
      - PROMETHEUS_EXPORTER_PORT=9100
      - PROMETHEUS_EXPORTER_BIND_ADDRESS=0.0.0.0

      # GPU environment
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    ports:
      - "9100:9100"  # Prometheus exporter HTTP endpoint

    volumes:
      # Mining configuration (read-only)
      - ./config/mining-config.toml:/app/config.toml:ro

      # Wallet data (read-only for security)
      - ./data/wallet:/app/wallet:ro

      # Log output
      - ./logs/mining:/app/logs

    networks:
      - monitoring

    restart: unless-stopped

    # GPU resource allocation
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Health check for mining application
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Prometheus Time-Series Database
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"  # 30 days hot retention
      - "--storage.tsdb.retention.size=100GB"  # Max 100GB storage
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"  # Enable reload via HTTP POST

    ports:
      - "9090:9090"  # Prometheus web UI

    volumes:
      # Configuration files (read-only)
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro

      # Persistent storage for time-series data
      - prometheus-data:/prometheus

    networks:
      - monitoring

    restart: unless-stopped

    depends_on:
      - mining-app

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Grafana Visualization Dashboard
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana

    environment:
      # Security settings
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-secure_password_here}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false

      # Server settings
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=false

      # Analytics (disable for privacy)
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false

      # Dashboard provisioning
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/mining-overview.json

    ports:
      - "3000:3000"  # Grafana web UI

    volumes:
      # Dashboard provisioning (read-only)
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro

      # Persistent storage for Grafana configuration
      - grafana-data:/var/lib/grafana

    networks:
      - monitoring

    restart: unless-stopped

    depends_on:
      - prometheus

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Alert Manager (Optional - for production alerts)
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"

    ports:
      - "9093:9093"  # Alert Manager web UI

    volumes:
      # Configuration (read-only)
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

      # Persistent storage for alert state
      - alertmanager-data:/alertmanager

    networks:
      - monitoring

    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Node Exporter (Optional - for system-level metrics)
  # ============================================================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter

    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

    ports:
      - "9110:9100"  # Node Exporter metrics (different port to avoid conflict)

    volumes:
      # Host system metrics (read-only)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave

    networks:
      - monitoring

    restart: unless-stopped

    # Run as host PID namespace for accurate metrics
    pid: host

# ============================================================================
# Networks Configuration
# ============================================================================
networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# Volumes Configuration
# ============================================================================
volumes:
  # Prometheus time-series data
  # Recommended: SSD storage for performance
  # Size: 100GB per node (30 days retention @ 10s resolution)
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/prometheus  # Update with actual SSD mount path

  # Grafana configuration and dashboards
  # Recommended: SSD storage
  # Size: 10GB
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/grafana  # Update with actual SSD mount path

  # Alert Manager state
  # Recommended: HDD acceptable (low I/O)
  # Size: 5GB
  alertmanager-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/alertmanager  # Update with actual mount path

# ============================================================================
# Usage Instructions
# ============================================================================
#
# 1. Prerequisites:
#    - Docker Engine 20.10+
#    - Docker Compose 2.0+
#    - NVIDIA Container Toolkit (for GPU access)
#
# 2. Configuration Setup:
#    mkdir -p config/{prometheus,grafana/{dashboards,datasources},alertmanager}
#    mkdir -p data/{wallet,prometheus,grafana,alertmanager}
#    mkdir -p logs/mining
#
# 3. Copy configuration files:
#    - prometheus.yml → config/prometheus/
#    - alert-rules.yml → config/prometheus/
#    - alertmanager.yml → config/alertmanager/
#    - dashboards/*.json → config/grafana/dashboards/
#    - datasources/*.yml → config/grafana/datasources/
#
# 4. Set Grafana admin password:
#    export GRAFANA_ADMIN_PASSWORD="your_secure_password"
#
# 5. Start the monitoring stack:
#    docker-compose -f docker-compose.monitoring.yml up -d
#
# 6. Verify services:
#    docker-compose -f docker-compose.monitoring.yml ps
#    curl http://localhost:9100/metrics  # Mining app metrics
#    curl http://localhost:9090/-/healthy  # Prometheus health
#    curl http://localhost:3000/api/health  # Grafana health
#
# 7. Access web interfaces:
#    - Prometheus: http://localhost:9090
#    - Grafana: http://localhost:3000 (admin / <GRAFANA_ADMIN_PASSWORD>)
#    - Alert Manager: http://localhost:9093
#
# 8. Stop the stack:
#    docker-compose -f docker-compose.monitoring.yml down
#
# 9. Remove volumes (WARNING: deletes all metrics data):
#    docker-compose -f docker-compose.monitoring.yml down -v
#
# ============================================================================
# Production Deployment Notes
# ============================================================================
#
# Security:
#   - Change default passwords in production
#   - Use HTTPS with reverse proxy (nginx/traefik)
#   - Restrict network access with firewall rules
#   - Enable authentication for all services
#
# Scaling:
#   - For multiple mining nodes, replicate mining-app service
#   - Update prometheus.yml scrape targets for all nodes
#   - Use service discovery for dynamic node detection
#
# Backup:
#   - Regularly backup Prometheus data: /data/prometheus
#   - Backup Grafana dashboards: /data/grafana
#   - Backup Alert Manager config: config/alertmanager/
#
# Monitoring:
#   - Set up external health checks for monitoring stack itself
#   - Configure log rotation for container logs
#   - Monitor disk space for time-series data growth
#
# Performance:
#   - Use SSD for Prometheus TSDB
#   - Tune retention based on available storage
#   - Consider remote storage (Thanos, Cortex) for long-term retention
#
# ============================================================================
