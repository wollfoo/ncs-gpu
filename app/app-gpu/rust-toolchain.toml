# Rust toolchain configuration cho GPU Mining project
# Được sử dụng bởi rust-overlay trong flake.nix để đảm bảo reproducible builds

[toolchain]
channel = "1.75.0"
components = [
    "rustc",
    "cargo",
    "rust-std",
    "rustfmt",
    "clippy",
]
targets = ["x86_64-unknown-linux-gnu"]

# Profile cho performance-critical ứng dụng
profile = "minimal"

# Verification hash để ensure integrity
# hash = "sha256-hash-of-toolchain"