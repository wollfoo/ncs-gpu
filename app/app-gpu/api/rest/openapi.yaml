openapi: 3.1.0
info:
  title: app-gpu REST API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /schedule:
    post:
      summary: Submit GPU job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobSpec'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResult'
components:
  schemas:
    JobSpec:
      type: object
      required: [wallet, pool_endpoint, gpu_index, dag_location]
      properties:
        wallet:
          type: string
        pool_endpoint:
          type: string
        gpu_index:
          type: integer
        dag_location:
          type: string
    ScheduleResult:
      type: object
      required: [job_id, queued_at]
      properties:
        job_id:
          type: string
        queued_at:
          type: string
          format: date-time
