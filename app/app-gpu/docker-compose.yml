version: '3.8'

services:
  opus-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: opus-gpu:2.0.0
    container_name: opus-gpu-main
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - RUST_LOG=info
      - OPUS_CONFIG=/etc/opus-gpu/config.toml
    volumes:
      - ./configs:/etc/opus-gpu:ro
      - opus-logs:/var/log/opus-gpu
      - opus-data:/var/lib/opus-gpu
    ports:
      - "8080:8080"  # API port
      - "9090:9090"  # Metrics port
    networks:
      - opus-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: opus-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - opus-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: opus-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - opus-network
    depends_on:
      - prometheus
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opus-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - opus-network
    restart: unless-stopped

networks:
  opus-network:
    driver: bridge

volumes:
  opus-logs:
  opus-data:
  prometheus-data:
  grafana-data:
  redis-data: