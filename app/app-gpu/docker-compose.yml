version: "3.9"
services:
  core:
    build: .
    image: app-gpu:dev
    environment:
      - RUST_LOG=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./configs:/opt/app/configs:ro
      - ./gpu/kernels:/opt/app/gpu/kernels:ro
    devices:
      - /dev/nvidia0:/dev/nvidia0
    depends_on:
      - otel-collector
  controller:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/opt/app/bin/controller"]
    environment:
      - CORE_ENDPOINT=http://core:8080
    depends_on:
      - core
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.87.0
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config", "/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
