[package]
name = "opus-gpu-executor"
version = "0.1.0"
edition = "2021"
authors = ["Opus GPU Team"]
description = "High-performance GPU executor with CUDA Graphs and Zero-Copy"

[dependencies]
# Workspace dependencies
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }

# CUDA & GPU
cudarc = { workspace = true }
nvml-wrapper = { workspace = true }

# Message queue
nats = { workspace = true }

# Monitoring
prometheus = { workspace = true }
opentelemetry = { workspace = true }

# Utilities
clap = { workspace = true }
config = { workspace = true }
uuid = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }

# Performance & memory management
memmap2 = "0.9"
page_size = "0.6"
libc = "0.2"

# Async utilities  
tokio-util = "0.7"
pin-project = "1.0"
once_cell = "1.0"
parking_lot = "0.12"

# Numerical computing
bytemuck = "1.14"
half = "2.3"

[build-dependencies]
cc = "1.0"

[[bin]]
name = "executor"
path = "src/main.rs"

[build]
# Link CUDA libraries
rustc-link-search = ["/usr/local/cuda/lib64"]
rustc-link-lib = ["cudart", "cuda", "curand", "cublas", "cufft"]
