[package]
name = "executor"
version = "0.1.0"
edition = "2021"
description = "GPU executor service handling job execution"
license = "Proprietary"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync", "net", "io-util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
nats-lite = { path = "../../common/nats-lite" }
metrics = "0.22"
metrics-exporter-prometheus = { version = "0.13", default-features = false, features = ["http-listener"] }
once_cell = "1"
