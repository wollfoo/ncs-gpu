version: '3.8'

services:
  api-gateway:
    image: gpu-mining/api:2.0.0
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
    ports:
      - "50051:50051"  # gRPC
      - "8080:8080"    # HTTP/Metrics
    environment:
      - GPU_API_LOG_LEVEL=info
      - GPU_API_GRPC_PORT=50051
      - GPU_API_HTTP_PORT=8080
    volumes:
      - ./configs/api.yaml:/etc/gpu-mining/config.yaml:ro
    networks:
      - gpu-mining
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  orchestrator:
    image: gpu-mining/orchestrator:2.0.0
    build:
      context: .
      dockerfile: deployments/docker/orchestrator.Dockerfile
    ports:
      - "8081:8081"  # Management API
    environment:
      - ORCHESTRATOR_LOG_LEVEL=info
      - ORCHESTRATOR_POOL_URL=${POOL_URL}
      - ORCHESTRATOR_WALLET_ADDRESS=${WALLET_ADDRESS}
      - ORCHESTRATOR_WORKER_NAME_PREFIX=docker
    volumes:
      - ./configs/orchestrator.yaml:/etc/gpu-mining/orchestrator.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - gpu-mining
    depends_on:
      - api-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  gpu-worker:
    image: gpu-mining/worker:2.0.0
    build:
      context: .
      dockerfile: deployments/docker/worker.Dockerfile
    ports:
      - "9090-9099:9090"  # Metrics (multiple workers)
    environment:
      - RUST_LOG=info
      - WORKER_POOL_URL=${POOL_URL}
      - WORKER_WALLET=${WALLET_ADDRESS}
    volumes:
      - ./configs/worker.toml:/etc/gpu-mining/worker.toml:ro
    networks:
      - gpu-mining
    depends_on:
      - orchestrator
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1  # Adjust based on GPU count
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - gpu-mining
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - gpu-mining
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  gpu-mining:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
