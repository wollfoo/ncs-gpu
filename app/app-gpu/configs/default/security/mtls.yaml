version: 1
ca:
  common_name: "opus-gpu-root"
  organization: "Opus GPU"
  validity_days: 365
services:
  control_plane:
    common_name: "control-plane.internal"
    sans:
      - "DNS:control-plane"
      - "DNS:control-plane.internal"
      - "IP:127.0.0.1"
    validity_days: 90
  scheduler:
    common_name: "scheduler.internal"
    sans:
      - "DNS:scheduler"
      - "DNS:scheduler.internal"
    validity_days: 60
  executor:
    common_name: "executor.internal"
    sans:
      - "DNS:executor"
      - "DNS:executor.internal"
    validity_days: 60
rotation:
  enabled: true
  overlap_hours: 24
