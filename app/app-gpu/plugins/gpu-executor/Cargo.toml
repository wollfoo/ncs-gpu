[package]
name = "opus-gpu-executor"
version = "2.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Core
opus-gpu-core = { path = "../../core" }
async-trait = "0.1"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"

# CUDA
cust = "0.3"  # Rust CUDA bindings
cust_core = "0.1"
nvml-wrapper = "0.9"  # NVIDIA Management Library
cuda-sys = "0.2"  # Low-level CUDA bindings

# Async & Concurrency
tokio = { version = "1.35", features = ["full"] }
crossbeam = "0.8"
parking_lot = "0.12"
dashmap = "5.5"

# Data structures
lockfree = "0.5"
concurrent-queue = "2.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

# Utilities
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
num_cpus = "1.16"
bytemuck = "1.14"

[dev-dependencies]
criterion = "0.5"
proptest = "1.4"
tempfile = "3.8"

[build-dependencies]
cc = "1.0"
cuda-builder = "0.3"

[features]
default = ["cuda"]
cuda = ["cust/cuda"]
profiling = []
benchmarks = []
