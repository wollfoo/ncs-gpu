[package]
name = "opus-gpu-mining"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
tokio.workspace = true
async-trait.workspace = true
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
uuid.workspace = true
chrono.workspace = true
futures.workspace = true
parking_lot.workspace = true
crossbeam.workspace = true

# GPU computing and CUDA
opus-gpu-gpu = { path = "../../infrastructure/gpu" }

# Message bus
opus-gpu-bus = { path = "../../infrastructure/bus" }

# Cryptography - KawPow algorithm support
sha2.workspace = true
sha3.workspace = true
blake3.workspace = true
keccak = "0.1"
ethash = "0.3"

# Mining specific
stratum = "0.2"
byteorder = "1.5"
hex = "0.4"
rand = "0.8"

# GPU and memory management
memmap2 = "0.9"
numa = "0.2"

# Performance and monitoring
metrics.workspace = true
histogram = "0.6"
perf-event = "0.4"

# Process management
libc = "0.2"
nix = "0.27"

# Configuration hot-reload
notify = "6.1"

[features]
cuda = ["opus-gpu-gpu/cuda"]
opencl = ["opus-gpu-gpu/opencl"]
vulkan = ["opus-gpu-gpu/vulkan"]
webgpu = ["opus-gpu-gpu/webgpu"]