name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: '18'
  GO_VERSION: '1.21'
  RUST_VERSION: 'stable'

jobs:
  # ==================== RUST JOBS ====================
  
  rust-check:
    name: 🦀 Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items

  rust-test:
    name: 🧪 Rust Tests
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run unit tests
        run: cargo test --verbose --all-features
      
      - name: Run integration tests
        run: cargo test --verbose --test '*' --all-features
      
      - name: Generate test coverage
        run: |
          cargo install cargo-tarpaulin || true
          cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          flags: rust

  # ==================== GO JOBS ====================
  
  go-check:
    name: 🐹 Go Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./control-plane/api-gateway
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      
      - name: Download dependencies
        run: go mod download
      
      - name: Verify dependencies
        run: go mod verify
      
      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "❌ Code not formatted. Run 'go fmt ./...'"
            gofmt -s -l .
            exit 1
          fi
      
      - name: Run go vet
        run: go vet ./...
      
      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1.3.0
        with:
          working-directory: ./control-plane/api-gateway
          version: "2023.1.6"

  go-test:
    name: 🧪 Go Tests
    runs-on: ubuntu-latest
    needs: go-check
    defaults:
      run:
        working-directory: ./control-plane/api-gateway
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./control-plane/api-gateway/coverage.out
          flags: go

  # ==================== TYPESCRIPT JOBS ====================
  
  typescript-check:
    name: 📦 TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tooling/ts-sdk
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './tooling/ts-sdk/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Lint
        run: npm run lint
      
      - name: Check formatting
        run: npx prettier --check "src/**/*.ts"

  typescript-test:
    name: 🧪 TypeScript Tests
    runs-on: ubuntu-latest
    needs: typescript-check
    defaults:
      run:
        working-directory: ./tooling/ts-sdk
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './tooling/ts-sdk/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test -- --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./tooling/ts-sdk/coverage/lcov.info
          flags: typescript

  # ==================== INTEGRATION JOBS ====================
  
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-test, go-test, typescript-test]
    services:
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
        options: --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8222/varz || exit 1" --health-interval 10s --health-timeout 5s --health-retries 5
      
      etcd:
        image: quay.io/coreos/etcd:v3.5.0
        ports:
          - 2379:2379
        env:
          ETCD_ADVERTISE_CLIENT_URLS: http://localhost:2379
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
          ETCD_INITIAL_ADVERTISE_PEER_URLS: http://localhost:2380
          ETCD_INITIAL_CLUSTER: default=http://localhost:2380
          ETCD_INITIAL_CLUSTER_STATE: new
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup multi-language environment
        uses: ./.github/actions/setup-env
      
      - name: Wait for services
        run: |
          echo "⏳ Waiting for services to be ready..."
          timeout 60 bash -c 'until nc -z localhost 4222; do sleep 1; done'
          timeout 60 bash -c 'until nc -z localhost 2379; do sleep 1; done'
          echo "✅ Services are ready"
      
      - name: Run integration tests
        run: |
          echo "🔗 Running integration test suite..."
          # TODO: Implement actual integration tests
          echo "✅ Integration tests passed (mock)"

  # ==================== SECURITY SCANS ====================
  
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Rust security audit
        run: |
          cargo install cargo-audit || true
          cargo audit
      
      - name: Go security scan
        uses: securecodewarrior/github-action-gosec@master
        with:
          args: '-fmt sarif -out gosec-results.sarif ./control-plane/api-gateway/...'
      
      - name: Upload GoSec scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'gosec-results.sarif'

  # ==================== BUILD JOB ====================
  
  build:
    name: 🏗️ Build All
    runs-on: ubuntu-latest
    needs: [rust-check, go-check, typescript-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup multi-language environment
        uses: ./.github/actions/setup-env
      
      - name: Build Rust components
        run: cargo build --release --verbose
      
      - name: Build Go components
        run: |
          cd control-plane/api-gateway
          go build -v -o ../../target/api-gateway ./main.go
      
      - name: Build TypeScript SDK
        run: |
          cd tooling/ts-sdk
          npm ci
          npm run build
      
      - name: Create build artifacts
        run: |
          mkdir -p artifacts
          cp target/release/opus-scheduler artifacts/
          cp target/release/opus-gpu-executor artifacts/
          cp target/api-gateway artifacts/
          tar -czf artifacts/ts-sdk.tar.gz -C tooling/ts-sdk/dist .
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: opus-gpu-binaries
          path: artifacts/
          retention-days: 7

  # ==================== DOCKER BUILD ====================
  
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
      
      - name: Build and push scheduler image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.scheduler
          push: true
          tags: ghcr.io/${{ github.repository }}/scheduler:${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push executor image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.executor
          push: true
          tags: ghcr.io/${{ github.repository }}/executor:${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push API gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api-gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
