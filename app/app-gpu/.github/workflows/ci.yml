name: ci

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.3'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-gpu/node/orchestration/package-lock.json

      - name: Install npm deps
        working-directory: app-gpu/node/orchestration
        run: npm install

      - name: Cargo check
        working-directory: app-gpu
        run: cargo check

      - name: Scheduler tests
        working-directory: app-gpu
        run: cargo test -p scheduler

      - name: Build config CLI and smoke convert
        working-directory: app-gpu
        run: |
          cargo run -p config-cli -- \
            --input configs/fixtures/legacy_config.json \
            --scheduler-out /tmp/generated-scheduler.yaml \
            --executor-out /tmp/generated-executor.toml
          cat /tmp/generated-scheduler.yaml
          cat /tmp/generated-executor.toml

      - name: Lint TypeScript
        working-directory: app-gpu/node/orchestration
        run: npm run lint

      - name: Go build
        working-directory: app-gpu/services/control-plane
        env:
          PATH: /usr/local/go/bin:${{ env.PATH }}
        run: go build ./...

      - name: Bootstrap PKI sandbox
        working-directory: app-gpu
        run: scripts/deploy/bootstrap_pki.sh

      - name: Upload PKI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-pki
          path: app-gpu/certs

