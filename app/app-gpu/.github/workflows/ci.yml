name: app-gpu-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.76.0
          components: rustfmt, clippy

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tooling/ts-sdk/package-lock.json

      - name: Install Node dependencies
        run: make deps

      - name: Format check
        run: make fmt

      - name: Lint
        run: make lint

      - name: Test suite
        run: make test

  sbom:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.76.0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Node dependencies
        run: make deps

      - name: Generate Rust SBOM metadata
        run: cargo metadata --format-version 1 > security/sbom/cargo-metadata.json

      - name: Generate Go module manifest
        run: go list -m -json all > ../../security/sbom/go-modules.json
        working-directory: control-plane/api-gateway

      - name: Generate Node dependency manifest
        run: npm ls --json > ../../security/sbom/node-deps.json
        working-directory: tooling/ts-sdk

      - name: Upload SBOM artefacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-manifests
          path: |
            security/sbom/cargo-metadata.json
            security/sbom/go-modules.json
            security/sbom/node-deps.json
