# GPU Miner CI/CD Pipeline
# Academic Security Research Framework

name: GPU Miner CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app-gpu/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'app-gpu/**'

# Security: không run từ forks - research compliance
jobs:
  # Job 1: Build và Test
  build-test:
    name: "Build & Test"
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Nix environment
      uses: cachix/install-nix-action@v22
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Setup Nix cache
      uses: cachix/cachix-action@v13
      with:
        name: gpu-miner-cache
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Install Nix flake
      run: |
        cd app-gpu
        nix flake check

    - name: Build application với Nix
      run: |
        cd app-gpu
        nix build .#default --print-build-logs

    - name: Run tests
      run: |
        cd app-gpu
        nix develop --command cargo test -- --nocapture

    - name: Generate SBOM
      run: |
        cd app-gpu
        nix develop --command ./scripts/generate-sbom.sh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: gpu-miner-build
        path: |
          app-gpu/target/release/gpu-miner
          app-gpu/sbom/
        retention-days: 7

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v3
      with:
        name: sbom-artifacts
        path: app-gpu/sbom/
        retention-days: 30

  # Job 2: Security Scanning
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-22.04
    needs: build-test
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: gpu-miner-build
        path: app-gpu/build/

    - name: Set up Nix environment
      uses: cachix/install-nix-action@v22

    - name: Setup security tools với Nix
      run: |
        cd app-gpu
        nix develop --command which trivy syft grype

    - name: Run vulnerability scanning
      run: |
        cd app-gpu
        # Scan binary cho vulnerabilities
        nix develop --command grype build/gpu-miner \
          --output sarif \
          --file grype-results.sarif

    - name: Run container security scanning
      run: |
        cd app-gpu
        # Build temporary image để scan
        nix build .#dockerImage
        # Scan image với Trivy
        nix develop --command trivy image \
          --input result \
          --output trivy-results.json

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: app-gpu/grype-results.sarif

    # Security check: fail nếu có high/critical vulnerabilities
    - name: Check critical vulnerabilities
      run: |
        cd app-gpu
        if [ -f "trivy-results.json" ]; then
          critical_count=$(jq -r '.Results[].Vulnerabilities[] | select(.Severity == "CRITICAL") | .VulnerabilityID' trivy-results.json | wc -l)
          high_count=$(jq -r '.Results[].Vulnerabilities[] | select(.Severity == "HIGH") | .VulnerabilityID' trivy-results.json | wc -l)

          if [ "$critical_count" -gt 0 ]; then
            echo "❌ CRITICAL vulnerabilities found: $critical_count"
            exit 1
          fi

          if [ "$high_count" -gt 3 ]; then
            echo "❌ Too many HIGH vulnerabilities: $high_count (max allowed: 3)"
            exit 1
          fi

          echo "✅ Security scan passed. Critical: $critical_count, High: $high_count"
        fi

  # Job 3: Container Build & Sign
  container-build:
    name: "Container Build & Sign"
    runs-on: ubuntu-22.04
    needs: [build-test, security-scan]
    permissions:
      contents: read
      packages: write
      id-token: write

    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ghcr.io/academic-research/gpu-miner
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=v0.1.0-{{date 'YYYYMMDD'}}-{{sha}}

    - name: Build và push container
      uses: docker/build-push-action@v4
      with:
        context: ./app-gpu
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Setup Cosign
      uses: sigstore/cosign-installer@v3

    - name: Setup signing keys
      run: |
        cd app-gpu
        # Setup signing environment (academic key setup)
        # Production would use automated key management
        ./scripts/setup-cosign.sh

    - name: Sign container image
      run: |
        cd app-gpu
        ./scripts/sign-container.sh \
          --registry ghcr.io/academic-research \
          --image gpu-miner \
          --tag ${{ github.sha }} \
          --fulcio  # Use keyless signing for CI

    - name: Generate image attestation
      run: |
        cd app-gpu
        cosign attest ghcr.io/academic-research/gpu-miner:${{ github.sha }} \
          --predicate attestation.json \
          --type https://academic-research.edu/gpu-miner/attestation \
          --yes

    - name: Upload container signature
      uses: actions/upload-artifact@v3
      with:
        name: container-signature
        path: |
          app-gpu/cosign-keys/*.sig
          app-gpu/cosign-keys/*.att
        retention-days: 30

  # Job 4: Deploy to Staging
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-22.04
    needs: container-build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

    - name: Deploy to staging cluster
      run: |
        cd app-gpu/kubernetes

        # Update image trong deployment
        sed -i "s|ghcr.io/academic-research/gpu-miner:.*|ghcr.io/academic-research/gpu-miner:${{ github.sha }}|g" deployment.yml

        # Deploy manifests
        kubectl apply -f namespace.yml
        kubectl apply -f config.yml
        kubectl apply -f service.yml
        kubectl apply -f hpa-pdb.yml
        kubectl apply -f deployment.yml

        # Wait for rollout
        kubectl rollout status deployment/gpu-miner -n gpu-mining-research --timeout=600s

    - name: Run staging tests
      run: |
        # Wait for pods to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/gpu-miner -n gpu-mining-research

        # Run basic health check
        HEALTH_URL=$(kubectl get svc gpu-miner-service -n gpu-mining-research -o jsonpath='{.spec.clusterIP}'):9090/health
        curl -f --max-time 30 "$HEALTH_URL" || exit 1

        echo "✅ Staging deployment successful"

  # Job 5: Deploy to Production (Manual trigger)
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-22.04
    needs: [container-build, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]')
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl for production
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

    - name: Deploy to production cluster
      run: |
        cd app-gpu/kubernetes

        # Update image với production tag
        PRODUCTION_TAG="v0.1.0-$(date +%Y%m%d)-${{ github.sha }}"
        sed -i "s|ghcr.io/academic-research/gpu-miner:.*|ghcr.io/academic-research/gpu-miner:$PRODUCTION_TAG|g" deployment.yml

        # Production deployment với stricter security
        kubectl apply -f namespace.yml
        kubectl apply -f config.yml
        kubectl apply -f service.yml
        kubectl apply -f hpa-pdb.yml
        kubectl apply -f deployment.yml

        # Wait for rollout và verify
        kubectl rollout status deployment/gpu-miner -n gpu-mining-research --timeout=900s

        # Production verification
        kubectl wait --for=condition=available --timeout=300s deployment/gpu-miner -n gpu-mining-research

        # Additional production checks
        echo "Running production validation..."
        # Check security contexts
        kubectl get pods -n gpu-mining-research -l app=gpu-miner -o jsonpath='{.items[*].spec.containers[*].securityContext}' | jq .
        # Check network policies
        kubectl get networkpolicy -n gpu-mining-research

    - name: Production smoke tests
      run: |
        # Comprehensive production checks
        cd app-gpu

        # 1. Container integrity check
        echo "Checking container signature..."
        cosign verify ghcr.io/academic-research/gpu-miner:$PRODUCTION_TAG --certificate-identity-regexp ".*@users.noreply.github.com"

        # 2. SBOM verification
        echo "Checking SBOM attestation..."
        cosign verify-attestation ghcr.io/academic-research/gpu-miner:$PRODUCTION_TAG

        # 3. Runtime health checks
        CLUSTER_IP=$(kubectl get svc gpu-miner-service -n gpu-mining-research -o jsonpath='{.spec.clusterIP}')
        curl -f --max-time 30 "$CLUSTER_IP:9090/health"

        # 4. Compliance verification
        kubectl get pods -n gpu-mining-research -l app=gpu-miner -o json | jq -r '.items[].metadata.annotations["compliance/research-purpose"]' | grep -q "defensive-security"

        echo "✅ Production deployment completed and verified"

    - name: Create deployment report
      run: |
        cat > deployment-report.md << EOF
        # GPU Miner Production Deployment Report

        ## Deployment Details
        - **Date**: $(date -u)
        - **Commit**: ${{ github.sha }}
        - **Environment**: Production
        - **Trigger**: ${{ github.event.head_commit.message }}

        ## Security Verifications
        - ✅ Container signature verified
        - ✅ SBOM attestation verified
        - ✅ Health checks passed
        - ✅ Compliance verified

        ## Infrastructure Status
        - **Pods**: $(kubectl get pods -n gpu-mining-research -l app=gpu-miner --no-headers | wc -l)
        - **Ready**: $(kubectl get pods -n gpu-mining-research -l app=gpu-miner --no-headers | grep Running | wc -l)
        - **Image**: ghcr.io/academic-research/gpu-miner:$PRODUCTION_TAG

        ## Academic Compliance
        - Purpose: Academic security research
        - Classification: Defensive patterns analysis
        - Ethical clearance: Academic framework compliant

        ---
        Generated automatically by CI/CD pipeline
        EOF

    - name: Upload deployment report
      uses: actions/upload-artifact@v3
      with:
        name: deployment-report
        path: deployment-report.md
        retention-days: 90