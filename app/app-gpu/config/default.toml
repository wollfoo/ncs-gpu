# GPU Mining System - Default Configuration
# Cấu hình mặc định cho hệ thống khai thác GPU

[server]
# **[Bind Address]** (Địa chỉ lắng nghe – gRPC server endpoint)
bind_address = "0.0.0.0:50051"

# **[Max Connections]** (Số kết nối tối đa – concurrent connections)
max_connections = 1000

[scheduler]
# **[Queue Capacity]** (Dung lượng hàng đợi – max pending tasks)
queue_capacity = 10000

# **[Task Timeout]** (Thời gian chờ tác vụ – seconds before timeout)
task_timeout_secs = 3600

# **[Retry Attempts]** (Số lần thử lại – max retries on failure)
retry_attempts = 3

[metrics]
# **[Enable Prometheus]** (Bật Prometheus – metrics export)
enable_prometheus = true

# **[Metrics Port]** (Cổng metrics – Prometheus endpoint)
metrics_port = 9090

[gpu]
# **[Memory Pool Size]** (Kích thước memory pool – MB per GPU)
memory_pool_size_mb = 2048

# **[Max Batch Size]** (Batch size tối đa)
max_batch_size = 128

# **[Stream Count]** (Số CUDA streams – concurrent kernel execution)
stream_count = 4

[workloads]
# **[Default Duration]** (Thời gian mặc định – seconds)
default_duration_secs = 60

# **[GPU Utilization Target]** (Mục tiêu sử dụng GPU – percentage)
gpu_utilization_target = 80.0

[security]
# **[Enable seccomp]** (Bật seccomp – syscall filtering)
enable_seccomp = true

# **[Enable AppArmor]** (Bật AppArmor – MAC policy)
enable_apparmor = true

# **[cgroup Memory Limit]** (Giới hạn bộ nhớ cgroup – MB)
cgroup_memory_limit_mb = 4096

# **[cgroup CPU Quota]** (Hạn mức CPU cgroup – percentage)
cgroup_cpu_quota_percent = 50

[logging]
# **[Log Level]** (Mức độ log – trace/debug/info/warn/error)
log_level = "info"

# **[Log Format]** (Định dạng log – json/text)
log_format = "json"

# **[Log Directory]** (Thư mục log)
log_directory = "/var/log/gpu-miner"
