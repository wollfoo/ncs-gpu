# Alerting rules cho GPU Mining monitoring
# Academic Security Research Framework

groups:
  # GPU Mining Performance Alerts
  - name: gpu-miner-performance.rules
    rules:
      # Hash rate drop - có thể là hệ thống bị compromised
      - alert: GpuMinerHashRateTooLow
        expr: gpu_miner_hash_rate < 1000
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "GPU Miner hash rate too low"
          description: "GPU hash rate {{ $value }} H/s is below threshold 1000 H/s for 5 minutes"
          research_note: "Monitor for potential system compromise or GPU failure"

      # GPU temperature quá cao
      - alert: GpuTemperatureHigh
        expr: gpu_temperature > 85
        for: 2m
        labels:
          severity: critical
          category: hardware
        annotations:
          summary: "GPU temperature critically high"
          description: "GPU temperature is {{ $value }}°C (threshold: 85°C)"
          runbook: "Check GPU cooling, reduce workload, monitor GPU health"

      # Memory usage cao bất thường
      - alert: GpuMemoryUsageHigh
        expr: (gpu_memory_used / gpu_memory_total) > 0.9
        for: 3m
        labels:
          severity: warning
          category: resources
        annotations:
          summary: "GPU memory usage critically high"
          description: "{{ $value | humanizePercentage }} of GPU memory used"
          research_note: "Monitor for memory leaks in mining operations"

      # Worker failures
      - alert: GpuMinerWorkersFailed
        expr: increase(gpu_miner_worker_failures[5m]) > 3
        labels:
          severity: warning
          category: operational
        annotations:
          summary: "GPU miner workers failing"
          description: "{{ $value }} worker failures detected in 5 minutes"
          research_note: "Check for system resource exhaustion or configuration issues"

  # Security Monitoring Alerts
  - name: gpu-miner-security.rules
    rules:
      # Unexpected network traffic
      - alert: GpuMinerNetworkAnomaly
        expr: increase(network_bytes_total[5m]) > 100000000  # 100MB in 5 min
        for: 1m
        labels:
          severity: info
          category: security
        annotations:
          summary: "High network usage detected"
          description: "{{ $value }} bytes transferred in 5 minutes"
          research_note: "Monitor for unauthorized data exfiltration"

      # CPU usage spikes (could indicate other processes)
      - alert: CpuUsageSpike
        expr: cpu_usage > 90
        for: 1m
        labels:
          severity: info
          category: security
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}%"
          research_note: "Monitor for additional CPU-intensive processes"

      # Abnormal memory consumption
      - alert: MemoryUsageSpike
        expr: (memory_used / memory_total) > 0.85
        for: 3m
        labels:
          severity: warning
          category: resources
        annotations:
          summary: "High memory usage"
          description: "{{ $value | humanizePercentage }} of memory used"
          research_note: "Check for memory leaks or unauthorized processes"

  # Container Health Alerts
  - name: gpu-miner-container.rules
    rules:
      # Container không chạy
      - alert: ContainerDown
        expr: up{job="gpu-miner"} == 0
        for: 1m
        labels:
          severity: critical
          category: operational
        annotations:
          summary: "GPU Miner container is down"
          description: "GPU Miner container has been down for more than 1 minute"
          runbook: "Check container logs, restart service, verify GPU access"

      # Prometheus scrape failures
      - alert: ScrapeFailed
        expr: up == 0
        for: 2m
        labels:
          severity: warning
          category: monitoring
        annotations:
          summary: "Metrics collection failed"
          description: "Prometheus unable to scrape metrics from target"
          research_note: "Check metrics endpoint health and network connectivity"

      # Container restarts frequently
      - alert: ContainerRestarting
        expr: increase(container_restarts_total{container_label_com_docker_compose_service="gpu-miner"}[5m]) > 2
        labels:
          severity: warning
          category: operational
        annotations:
          summary: "Container restarting frequently"
          description: "GPU Miner container has restarted {{ $value }} times in 5 minutes"
          runbook: "Check container logs for errors, verify resource limits, check GPU drivers"

  # GPU Hardware Health Alerts
  - name: gpu-hardware-health.rules
    rules:
      # GPU utilization quá thấp
      - alert: GpuUtilizationLow
        expr: gpu_utilization < 10
        for: 10m
        labels:
          severity: info
          category: performance
        annotations:
          summary: "GPU utilization abnormally low"
          description: "GPU utilization is {{ $value }}% (expected >10% for mining)"
          research_note: "Monitor for GPU failures or mining process issues"

      # GPU memory corruption indicators
      - alert: GpuMemoryErrors
        expr: increase(gpu_memory_ecc_errors_total[5m]) > 0
        for: 30s
        labels:
          severity: critical
          category: hardware
        annotations:
          summary: "GPU memory errors detected"
          description: "{{ $value }} GPU memory errors in 5 minutes"
          runbook: "Check GPU hardware health, consider hardware replacement"

      # Power consumption anomalies
      - alert: GpuPowerSpike
        expr: gpu_power_draw > 300  # Watts
        for: 2m
        labels:
          severity: warning
          category: hardware
        annotations:
          summary: "GPU power consumption high"
          description: "GPU power draw is {{ $value }}W (threshold: 300W)"
          research_note: "Monitor for power supply issues or anomalous workload"

  # Academic Research Compliance Alerts
  - name: research-compliance.rules
    rules:
      # Ensure research-only usage
      - alert: UnauthorizedUsageDetected
        expr: gpu_miner_mode{research="false"} == 1
        for: 10s
        labels:
          severity: critical
          category: compliance
        annotations:
          summary: "Unauthorized usage detected"
          description: "GPU Miner detected non-research usage mode"
          compliance: "Academic research framework violation"

      # Data exfiltration warning
      - alert: DataExfiltrationSuspicious
        expr: (rate(network_bytes_outgoing[5m]) / rate(network_bytes_incoming[5m])) > 10
        for: 2m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Suspicious outbound traffic pattern"
          description: "Outbound traffic 10x higher than inbound"
          research_note: "Monitor for potential data exfiltration attempts"

      # Resource usage outside expected parameters
      - alert: ResourceUsageAnomaly
        expr: abs(gpu_memory_used - predict_linear(gpu_memory_used[1h], 3600)) > 1000000000
        for: 5m
        labels:
          severity: info
          category: monitoring
        annotations:
          summary: "Resource usage anomaly detected"
          description: "Memory usage deviated significantly from predicted pattern"
          research_note: "Monitor for unauthorized resource consumption"