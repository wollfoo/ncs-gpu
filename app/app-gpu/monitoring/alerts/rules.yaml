# OPUS-GPU Alert Rules Configuration
# Prometheus alerting rules for comprehensive monitoring

groups:
  - name: gpu_alerts
    interval: 30s
    rules:
      # GPU Utilization Alerts
      - alert: HighGPUUtilization
        expr: opus_gpu_utilization_percent > 95
        for: 5m
        labels:
          severity: warning
          component: gpu
        annotations:
          summary: "High GPU utilization on device {{ $labels.device_id }}"
          description: "GPU {{ $labels.device_name }} (ID: {{ $labels.device_id }}) has been above 95% utilization for 5 minutes (current: {{ $value }}%)"
          
      - alert: GPUMemoryExhaustion
        expr: (opus_gpu_memory_used_bytes / opus_gpu_memory_total_bytes) > 0.95
        for: 2m
        labels:
          severity: critical
          component: gpu
        annotations:
          summary: "GPU memory nearly exhausted on device {{ $labels.device_id }}"
          description: "GPU {{ $labels.device_name }} has less than 5% memory available ({{ $value | humanizePercentage }} used)"
          action: "Consider reducing batch sizes or offloading tasks"
          
      # Temperature Alerts
      - alert: HighGPUTemperature
        expr: opus_gpu_temperature_celsius > 80
        for: 3m
        labels:
          severity: warning
          component: gpu
        annotations:
          summary: "High temperature on GPU {{ $labels.device_id }}"
          description: "GPU {{ $labels.device_name }} temperature is {{ $value }}°C (threshold: 80°C)"
          
      - alert: CriticalGPUTemperature
        expr: opus_gpu_temperature_celsius > 90
        for: 1m
        labels:
          severity: critical
          component: gpu
        annotations:
          summary: "CRITICAL: GPU {{ $labels.device_id }} overheating"
          description: "GPU {{ $labels.device_name }} temperature is {{ $value }}°C - immediate action required!"
          action: "Reduce load immediately or risk hardware damage"
          
      # Power Alerts
      - alert: HighPowerConsumption
        expr: opus_gpu_power_usage_watts > 350
        for: 5m
        labels:
          severity: warning
          component: gpu
        annotations:
          summary: "High power consumption on GPU {{ $labels.device_id }}"
          description: "GPU {{ $labels.device_name }} is consuming {{ $value }}W"

  - name: task_alerts
    interval: 30s
    rules:
      # Task Processing Alerts
      - alert: HighTaskFailureRate
        expr: |
          (rate(opus_tasks_status{status="failed"}[5m]) / 
           rate(opus_tasks_submitted_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          component: scheduler
        annotations:
          summary: "High task failure rate detected"
          description: "Task failure rate is {{ $value | humanizePercentage }} over the last 5 minutes"
          
      - alert: TaskQueueBacklog
        expr: sum(opus_task_queue_length) > 1000
        for: 10m
        labels:
          severity: warning
          component: scheduler
        annotations:
          summary: "Large task queue backlog"
          description: "Task queue has {{ $value }} pending tasks"
          action: "Consider scaling up workers or optimizing task processing"
          
      - alert: LongRunningTasks
        expr: histogram_quantile(0.95, rate(opus_task_duration_seconds_bucket[5m])) > 300
        for: 10m
        labels:
          severity: info
          component: scheduler
        annotations:
          summary: "Tasks taking longer than expected"
          description: "95th percentile task duration is {{ $value | humanizeDuration }}"

  - name: memory_pool_alerts
    interval: 30s
    rules:
      # Memory Pool Alerts
      - alert: HighMemoryFragmentation
        expr: opus_memory_pool_fragmentation_ratio > 0.3
        for: 10m
        labels:
          severity: warning
          component: memory
        annotations:
          summary: "High memory pool fragmentation"
          description: "Memory pool fragmentation is {{ $value | humanizePercentage }} for device {{ $labels.device_id }}"
          action: "Consider triggering memory defragmentation"
          
      - alert: FrequentMemoryAllocations
        expr: rate(opus_memory_pool_allocations_total[1m]) > 100
        for: 5m
        labels:
          severity: info
          component: memory
        annotations:
          summary: "High memory allocation rate"
          description: "Memory allocation rate is {{ $value }}/sec for pool {{ $labels.pool_size }}"

  - name: system_alerts
    interval: 30s
    rules:
      # System Health Alerts
      - alert: ServiceDown
        expr: up{job="opus-gpu"} == 0
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "OPUS-GPU service is down"
          description: "Service {{ $labels.instance }} has been down for 1 minute"
          action: "Check service logs and restart if necessary"
          
      - alert: HighErrorRate
        expr: rate(opus_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}/sec (type: {{ $labels.error_type }})"
          
      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.99, 
            rate(opus_request_latency_seconds_bucket[5m])
          ) > 1
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API request latency"
          description: "99th percentile latency is {{ $value | humanizeDuration }} for endpoint {{ $labels.endpoint }}"

  - name: plugin_alerts
    interval: 30s
    rules:
      # Plugin Alerts
      - alert: PluginLoadFailure
        expr: increase(opus_plugin_errors_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
          component: plugin
        annotations:
          summary: "Plugin {{ $labels.plugin_name }} experiencing errors"
          description: "Plugin {{ $labels.plugin_name }} has {{ $value }} errors in the last 5 minutes"
          
      - alert: SlowPluginExecution
        expr: |
          histogram_quantile(0.95, 
            rate(opus_plugin_load_time_seconds_bucket[5m])
          ) > 10
        for: 5m
        labels:
          severity: info
          component: plugin
        annotations:
          summary: "Slow plugin loading"
          description: "Plugin {{ $labels.plugin_name }} taking {{ $value | humanizeDuration }} to load"

  - name: cuda_alerts
    interval: 30s
    rules:
      # CUDA Kernel Alerts
      - alert: SlowCUDAKernels
        expr: |
          histogram_quantile(0.95,
            rate(opus_cuda_kernel_time_seconds_bucket[5m])
          ) > 0.1
        for: 10m
        labels:
          severity: info
          component: cuda
        annotations:
          summary: "CUDA kernel execution slow"
          description: "Kernel {{ $labels.kernel_name }} 95th percentile execution time is {{ $value | humanizeDuration }}"
          
      - alert: CUDAKernelFailures
        expr: |
          (rate(opus_cuda_kernels_executed_total[5m]) -
           rate(opus_cuda_kernel_time_seconds_count[5m])) > 0
        for: 5m
        labels:
          severity: warning
          component: cuda
        annotations:
          summary: "CUDA kernel execution failures detected"
          description: "CUDA kernels are failing on device {{ $labels.device_id }}"

# Alerting Routes Configuration
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 0s
      repeat_interval: 5m
      
    # GPU specific alerts
    - match_re:
        component: gpu
      receiver: 'gpu-team'
      group_by: ['device_id']
      
    # Task/Scheduler alerts
    - match:
        component: scheduler
      receiver: 'scheduler-team'
      
    # CUDA alerts
    - match:
        component: cuda
      receiver: 'gpu-team'
      group_by: ['kernel_name', 'device_id']

# Receiver Configurations
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:8080/alerts'
        send_resolved: true
        
  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://localhost:8080/critical-alerts'
        send_resolved: true
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        severity: 'critical'
    
  - name: 'gpu-team'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#gpu-alerts'
        title: 'GPU Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        
  - name: 'scheduler-team'
    email_configs:
      - to: 'scheduler-team@opus-gpu.com'
        from: 'alerts@opus-gpu.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alerts@opus-gpu.com'
        auth_password: 'YOUR_EMAIL_PASSWORD'
        headers:
          Subject: 'OPUS-GPU Scheduler Alert'

# Inhibition Rules
inhibit_rules:
  # Don't send warnings if critical alert is already firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'device_id']
    
  # Don't send info alerts if warning is firing
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'component']
