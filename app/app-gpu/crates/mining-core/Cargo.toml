[package]
name = "mining-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
tokio = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
sha2 = { workspace = true }
blake3 = { workspace = true }
rand = { workspace = true }
cuda-runtime-sys = { workspace = true }
rayon = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
hex = "0.4"  # Hex encoding/decoding (mã hóa/giải mã hex)

# GPU Management (Quản lý GPU)
nvml-wrapper = { version = "0.10", optional = true }  # NVML bindings cho NVIDIA GPUs
parking_lot = "0.12"  # Fast mutex/rwlock implementation

[build-dependencies]
cc = { version = "1.0", features = ["parallel"] }  # C/C++ compiler với parallel compilation
which = "6.0"  # Find executables in PATH

# Test dependencies (phụ thuộc test)
[dev-dependencies]
tokio-test = "0.4"  # Async test utilities (tiện ích test bất đồng bộ)
mockall = "0.11"    # Mock generation library (thư viện tạo mock)
assert_matches = "1.5"  # Assertions for pattern matching (khẳng định mẫu khớp)
criterion = { version = "0.5", features = ["html_reports"] }  # Benchmarking framework (khung đo điểm chuẩn)

[features]
default = ["nvml"]
cuda = []  # CUDA support (tự động enable bởi build.rs khi detect được CUDA toolkit)
nvml = ["nvml-wrapper"]  # NVML support cho GPU monitoring (mặc định enable)

[lib]
crate-type = ["rlib", "cdylib"]  # cdylib cho Python FFI (giao diện Python)
