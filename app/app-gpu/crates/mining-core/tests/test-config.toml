# Test Configuration File for Mining Core Tests
# Contains test scenarios, mock data, and performance test parameters

title = "Mining Core Test Configuration"
description = "Configuration for comprehensive testing of GPU Mining Core"

[general]
test_timeout_seconds = 300
enable_coverage_reporting = true
log_level = "debug"
cleanup_after_tests = true

[mock_pool]
bind_address = "127.0.0.1:3333"
response_delay_ms = 50
reject_probability = 0.1
disconnect_probability = 0.01
max_connections = 10
user_agent = "MockMiningPool/1.0.0"

[mock_gpus]
gpu0 = { name = "NVIDIA RTX 3080", memory_gb = 10, hashrate_mh = 95.0, compute_capability = [8, 6] }
gpu1 = { name = "NVIDIA RTX 4070", memory_gb = 12, hashrate_mh = 55.0, compute_capability = [8, 9] }
gpu2 = { name = "NVIDIA RTX 4060", memory_gb = 8, hashrate_mh = 30.0, compute_capability = [8, 9] }

[mock_algorithm_test_data]
ethash_job = { job_id = "test-job-ethash-001", difficulty = 1000.0, clean_jobs = true }
kawpow_job = { job_id = "test-job-kawpow-001", difficulty = 1000.0, clean_jobs = false }

[performance_benchmarks]
kernel_init_timeout_ms = 5000
mining_simulation_duration_sec = 10
stress_test_duration_sec = 30
max_memory_usage_mb = 1024
min_hashrate_mh = 1.0

[error_injection]
enable_network_failures = true
enable_gpu_timeouts = true
enable_memory_pressure = false
invalid_share_rate = 0.05
connection_drop_rate = 0.02

[test_scenarios]
single_gpu_basic = { gpu_ids = [0], algorithm = "Ethash", duration_sec = 5 }
multi_gpu_stress = { gpu_ids = [0, 1, 2], algorithm = "Ethash", duration_sec = 15 }
pool_failover = { primary_pool_timeout_ms = 5000, backup_pool_count = 2 }
error_recovery = { injection_rate = 0.1, recovery_timeout_sec = 10 }

[coverage_targets]
minimum_coverage_percent = 50.0
excluded_files = ["tests/", "build.rs", "src/cuda/"]

[telemetry]
enable_test_telemetry = true
metrics_collection_interval_ms = 1000
export_format = "json"

[integration_tests]
end_to_end_enabled = true
gpu_coordination_test = true
pool_connection_test = true
statistics_validation = true
cleanup_validation = true