[package]
name = "security"
version = "0.1.0"
edition = "2021"
authors = ["Opus GPU Team"]

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }

# Logging
tracing = "0.1"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Cryptography (mật mã học)
aes-gcm = "0.10"
argon2 = "0.5"
rand = "0.8"

# Seccomp (lọc syscall)
libseccomp = "0.3"

# Linux capabilities
caps = "0.5"

# Namespace isolation (cô lập namespace)
nix = { version = "0.27", features = ["user", "mount", "sched"] }

# Low-level system calls (gọi hệ thống cấp thấp)
libc = "0.2"

serde_json.workspace = true

[dev-dependencies]
tempfile = "3.8"
