[package]
name = "app-gpu"
version = "0.1.0"
edition = "2021"
authors = ["Opus GPU Team <devnull@example.com>"]
description = "GPU mining load simulator with distributed orchestrator/worker in Rust (mô phỏng tải GPU, hỗ trợ phân tán)"
license = "Apache-2.0"

[profile.release]
# **LTO** (tối ưu liên kết – Link Time Optimization) + **strip** (loại bỏ symbol) để giảm kích thước và tăng khó reverse
lto = "fat"
codegen-units = 1
opt-level = "z"
strip = true
panic = "abort"

[features]
default = []
gpu = ["ocl"]

[dependencies]
# **Tokio** (runtime bất đồng bộ – async runtime)
tokio = { version = "1", features = ["full"] }
# **Axum** (web framework – khung HTTP) cho orchestrator
axum = { version = "0.7" }
# **Hyper** (HTTP library – thư viện HTTP) gián tiếp qua axum
hyper = { version = "1", features = ["full"] }
# **Serde** (serialize/deserialize – tuần tự hoá)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# **Thiserror** (định nghĩa lỗi tiện lợi)
thiserror = "1"
# **Tracing** (logging hiện đại)
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
# **Clap** (CLI – dòng lệnh)
clap = { version = "4", features = ["derive"] }
# **OCL** (OpenCL cho Rust – chạy kernel GPU động)
ocl = { version = "0.19", optional = true }
# **Rand** (sinh số ngẫu nhiên)
rand = "0.8"
# **Reqwest** (HTTP client – worker gọi orchestrator)
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
# **UUID** (định danh duy nhất)
uuid = { version = "1", features = ["v4", "serde"] }
# **Anyhow** (xử lý lỗi tổng quát)
anyhow = "1"
# **Time** (thời gian)
chrono = { version = "0.4", features = ["clock"] }

[dev-dependencies]
# Test framework bổ sung nếu cần
assert_cmd = "2"

[[bin]]
name = "orchestrator"
path = "src/bin/orchestrator.rs"

[[bin]]
name = "worker"
path = "src/bin/worker.rs"
