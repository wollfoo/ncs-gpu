[workspace]
members = [
    "crates/common",
    "crates/scheduler",
    "crates/executor",
    "crates/config-cli",
    "crates/telemetry",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "Proprietary"
authors = ["Opus GPU Engineering"]

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
serde_yaml = "0.9"
toml = "0.8"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time", "sync", "process"] }
clap = { version = "4", features = ["derive"] }
tokio-stream = "0.1"
tonic = { version = "0.11", features = ["transport"] }
prost = "0.12"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
opentelemetry = "0.24"
opentelemetry_sdk = { version = "0.24", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.17", features = ["grpc-tonic", "metrics"] }
metrics = "0.22.4"
metrics-exporter-prometheus = "0.13"
