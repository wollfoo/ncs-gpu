[workspace]
resolver = "2"
members = [
    "core",
    "plugins/gpu-executor",
    # "plugins/monitor",
    # "shared/proto",
    # "shared/crypto",
    # "shared/metrics",
]

[workspace.package]
version = "2.0.0"
edition = "2021"
authors = ["OPUS-GPU Team"]
license = "Proprietary"
repository = "https://github.com/opus-gpu/v2"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"

# Plugin system
libloading = "0.8"
dlopen = "0.1"
dlopen_derive = "0.1"

# IPC & Serialization
shared_memory = "0.12"
capnp = "0.18"
flatbuffers = "23.5"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

# Configuration
config = "0.13"
serde_yaml = "0.9"
toml = "0.8"
notify = "6.1"

# Logging & Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Error handling
thiserror = "1.0"
anyhow = "1.0"
color-eyre = "0.6"

# Metrics & Monitoring
prometheus = "0.13"
opentelemetry = "0.21"
opentelemetry-prometheus = "0.14"

# Utilities
crossbeam = "0.8"
parking_lot = "0.12"
once_cell = "1.19"
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Testing
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.4"
mockall = "0.12"
tempfile = "3.8"

# Compression
flate2 = "1.0"

# Build dependencies
[workspace.dependencies.build]
cc = "1.0"
cmake = "0.1"
pkg-config = "0.3"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.bench]
inherits = "release"

# Optimizations for binary size
[profile.release-small]
inherits = "release"
opt-level = "z"     # Optimize for size
lto = "fat"         # Full LTO
strip = true        # Strip symbols

# Profile for obfuscated builds
[profile.obfuscated]
inherits = "release"
overflow-checks = false
debug-assertions = false
