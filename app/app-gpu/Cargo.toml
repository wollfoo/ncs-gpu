[workspace]
members = [
    "cmd/app-gpu",
    "internal/domain",
    "internal/scheduler",
    "pkg/telemetry",
    "gpu/bindings",
    "tests/rust"
]
resolver = "2"

[workspace.package]
edition = "2021"
authors = ["Opus GPU Refactor Team"]
license = "Proprietary"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
axum = { version = "0.7", features = ["macros", "json"] }
chrono = "0.4"
config = "0.14"
criterion = "0.3"
metrics = "0.21"
metrics-exporter-prometheus = "0.12"
prost = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
tonic = { version = "0.11", features = ["transport"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tokio-test = "0.4"
metrics-util = "0.17"

