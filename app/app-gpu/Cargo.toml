[package]
name = "opus-gpu"
version = "2.0.0"
edition = "2021"
authors = ["OPUS-GPU Team"]
description = "High-performance GPU mining and resource management system"
license = "MIT"
rust-version = "1.70"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
tokio-util = "0.7"
futures = "0.3"

# CUDA bindings
cudarc = { version = "0.10", features = ["f16"], optional = true }
# rustacuda = "0.1" # Alternative CUDA wrapper
half = "2.3"

# Cryptography and security
ring = { version = "0.17", optional = true }
rustls = { version = "0.21", optional = true }
rustls-native-certs = { version = "0.6", optional = true }
webpki = { version = "0.22", optional = true }
x509-parser = { version = "0.15", optional = true }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Metrics and monitoring
prometheus = { version = "0.13", features = ["process"], optional = true }
metrics = { version = "0.21", optional = true }
metrics-exporter-prometheus = { version = "0.12", optional = true }

# Configuration
config = "0.13"
clap = { version = "4.4", features = ["derive"] }

# Concurrency and data structures
crossbeam = "0.8"
crossbeam-channel = "0.5"
crossbeam-utils = "0.8"
atomic = "0.5"
parking_lot = "0.12"

# System interaction
libc = "0.2"
nix = "0.27"
sysinfo = "0.29"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Memory management
bumpalo = "3.14"
mimalloc = { version = "0.1", default-features = false }

# Math and optimization
num-traits = "0.2"
rand = "0.8"
rand_chacha = "0.3"

# Network
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
tungstenite = "0.20"
tokio-tungstenite = "0.20"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Additional dependencies for compilation
toml = "0.8"
md5 = "0.7"
num_cpus = "1.16"
sys-info = "0.9"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.3"
mockall = "0.11"
tempfile = "3.8"

[features]
default = ["metrics"]
cuda = ["dep:cudarc"]
metrics = ["dep:prometheus", "dep:metrics", "dep:metrics-exporter-prometheus"]
security = ["dep:ring", "dep:rustls", "dep:rustls-native-certs", "dep:webpki", "dep:x509-parser"]
stealth = []
enterprise = ["stealth", "metrics"]

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.release-with-debug]
inherits = "release"
debug = true
strip = false

[profile.bench]
inherits = "release"
debug = true


# [lib]
# name = "opus_gpu"
# path = "src/lib.rs"

[[bin]]
name = "opus-gpu"
path = "src/main.rs"

[[bin]]
name = "opus-gpu-simple"
path = "src/simple_main.rs"