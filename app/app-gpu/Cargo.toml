[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/gpu-executor",
    "crates/cloaking",
    "crates/resource-manager",
    "crates/security",
    "crates/ffi-bindings",
    "crates/common",
]

[workspace.package]
version = "1.0.0"
edition = "2021"
rust-version = "1.75"
authors = ["GPU Systems Team <team@example.com>"]
license = "MIT"
repository = "https://github.com/example/opus-gpu"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging & tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Concurrency
crossbeam = "0.8"
parking_lot = "0.12"
rayon = "1.8"

# GPU/CUDA
cudarc = { version = "0.10", features = ["cuda-12050"] }
nvml-wrapper = "0.9"

# IPC & Shared Memory
shared_memory = "0.12"
memmap2 = "0.9"

# Configuration
config = "0.13"

# Time
chrono = "0.4"

# Crypto & Security
ring = "0.17"
rustls = "0.21"
ed25519-dalek = "2.0"

# CLI
clap = { version = "4.4", features = ["derive"] }

# Testing
criterion = "0.5"
proptest = "1.4"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[profile.bench]
inherits = "release"

[profile.dev]
opt-level = 0
debug = true
