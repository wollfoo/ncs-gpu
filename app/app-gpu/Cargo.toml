[workspace]
members = [
    "crates/coordinator",
    "crates/worker",
    "crates/api",
    "crates/cli",
    "crates/telemetry",
    "crates/common",
]
resolver = "2"

[workspace.package]
version = "2.0.0"
edition = "2021"
rust-version = "1.75"
authors = ["NTV Team"]
license = "Proprietary"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
tokio-stream = "0.1"

# gRPC
tonic = "0.10"
prost = "0.12"

# HTTP
axum = "0.7"
hyper = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Logging & metrics
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
prometheus = "0.13"

# GPU monitoring
nvml-wrapper = "0.9"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# CLI
clap = { version = "4.4", features = ["derive"] }

# Concurrency
crossbeam = "0.8"
parking_lot = "0.12"

# CUDA FFI
cc = "1.0"
bindgen = "0.69"

[profile.release]
opt-level = 3
lto = "fat"           # Link-time optimization
codegen-units = 1
strip = true          # Strip symbols (obfuscation)
panic = "abort"

[profile.bench]
inherits = "release"
