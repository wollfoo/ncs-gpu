# Opus GPU Engine Configuration File
# Cấu hình động cơ khai thác GPU Opus

[gpu]
# Maximum number of GPUs to use (null = all available)
# Số lượng GPU tối đa sử dụng (null = tất cả)
max_gpus = null

# Specific GPU indices to use (empty = all)
# Chỉ số GPU cụ thể (rỗng = tất cả)
gpu_indices = []

# Maximum GPU utilization percentage
# Phần trăm sử dụng GPU tối đa
max_utilization = 90

# Maximum GPU temperature in Celsius
# Nhiệt độ GPU tối đa (°C)
max_temperature = 85

# Memory allocation percentage (0.0 - 1.0)
# Phần trăm phân bổ bộ nhớ
memory_allocation = 0.9

# Enable GPU metrics collection
# Bật thu thập metrics GPU
enable_metrics = true

[mining]
# Mining algorithm (kawpow, ethash, etc.)
# Thuật toán khai thác
algorithm = "kawpow"

# Mining pool address
# Địa chỉ pool khai thác
pool_address = "stratum+ssl://your.pool.com:3333"

# Wallet address
# Địa chỉ ví
wallet_address = "YOUR_WALLET_ADDRESS"

# Worker name
# Tên worker
worker_name = "opus-gpu"

# Enable TLS/SSL
# Bật mã hóa TLS/SSL
enable_tls = true

# Mining intensity (0-100)
# Cường độ khai thác
intensity = 80

# Enable auto-tuning
# Bật tự động điều chỉnh
auto_tune = true

# Custom parameters
# Tham số tùy chỉnh
custom_params = []

[scheduler]
# Number of worker threads (null = CPU count)
# Số luồng worker (null = số CPU)
worker_threads = null

# Task queue size
# Kích thước hàng đợi tác vụ
queue_size = 1000

# Enable work stealing
# Bật work stealing
work_stealing = true

# Task timeout in seconds
# Timeout tác vụ (giây)
task_timeout = 300

# Retry failed tasks
# Thử lại tác vụ thất bại
retry_failed = true

# Maximum retry attempts
# Số lần thử lại tối đa
max_retries = 3

[metrics]
# Enable metrics collection
# Bật thu thập metrics
enabled = true

# Metrics server port
# Cổng server metrics
port = 9090

# Collection interval in seconds
# Khoảng thời gian thu thập (giây)
interval = 10

# Enable detailed metrics
# Bật metrics chi tiết
detailed = false

# Export format (prometheus, json)
# Định dạng xuất
export_format = "prometheus"

[security]
# Enable encryption
# Bật mã hóa
enable_encryption = true

# Encryption algorithm
# Thuật toán mã hóa
encryption_algorithm = "aes-256-gcm"

# Enable authentication
# Bật xác thực
enable_auth = false

# API key (optional)
# Khóa API (tùy chọn)
api_key = null

# Allowed IP addresses (empty = all)
# Địa chỉ IP được phép (rỗng = tất cả)
allowed_ips = []

# Enable audit logging
# Bật ghi log kiểm toán
audit_logging = true

[features]
# Enable cloaking/stealth mode
# Bật chế độ ngụy trang
cloaking = false

# Enable auto-optimization
# Bật tối ưu tự động
auto_optimize = true

# Enable debug mode
# Bật chế độ debug
debug_mode = false

# Enable experimental features
# Bật tính năng thử nghiệm
experimental = false