# Production Docker Compose for App-GPU Event-Driven Architecture
version: '3.8'

services:
  #============================================================================
  # NATS JetStream - Event Bus
  #============================================================================
  nats:
    image: nats:2.10-alpine
    container_name: app-gpu-nats
    restart: unless-stopped
    ports:
      - "4222:4222"  # NATS client connections
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Cluster routing
    command: 
      - "nats-server"
      - "--jetstream"
      - "--store_dir=/data"
      - "--cluster=nats://0.0.0.0:6222"
      - "--http_port=8222"
      - "--log_file=/dev/stdout"
      - "--max_payload=8MB"
      - "--max_pending=256MB"
    volumes:
      - nats_data:/data
      - ./docker/nats.conf:/etc/nats/nats-server.conf:ro
    healthcheck:
      test: ["CMD", "nats", "server", "check", "--server=nats://localhost:4222"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-gpu-network

  #============================================================================
  # App-GPU Main Application
  #============================================================================
  app-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-gpu-main
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    ports:
      - "8080:8080"  # Main application port
      - "9090:9090"  # Metrics port (Prometheus)
    environment:
      # NATS Configuration
      - NATS_URL=nats://nats:4222
      
      # GPU Configuration
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0,1
      - GPU_INDICES=0,1
      - GPU_MEMORY_POOL_MB=2048
      - GPU_TEMPERATURE_THRESHOLD=80
      
      # Application Configuration
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - ENVIRONMENT=production
      - METRICS_PORT=9090
      
      # Security Configuration
      - ENABLE_STEALTH_MODE=true
      - TLS_ENABLED=true
      
      # Performance Configuration
      - WORKER_GPU_COUNT=4
      - WORKER_RESOURCE_COUNT=2
      - WORKER_STEALTH_COUNT=1
      - WORKER_QUEUE_SIZE=1000
      
      # Resource Limits
      - MEMORY_LIMIT_MB=4096
      - CPU_CORES=8
      
      # Auto-scaling
      - AUTO_SCALING_ENABLED=true
      - SCALE_UP_THRESHOLD=0.8
      - SCALE_DOWN_THRESHOLD=0.3
      
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '8.0'
        reservations:
          memory: 2G
          cpus: '4.0'
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ./data:/app/data
    networks:
      - app-gpu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  #============================================================================
  # Monitoring Stack
  #============================================================================
  
  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: app-gpu-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"  # Avoid conflict with app metrics port
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - app-gpu-network
    depends_on:
      - app-gpu

  # Grafana - Metrics Visualization  
  grafana:
    image: grafana/grafana-oss:10.0.0
    container_name: app-gpu-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - app-gpu-network
    depends_on:
      - prometheus

  #============================================================================
  # Log Management
  #============================================================================
  
  # Loki - Log Aggregation
  loki:
    image: grafana/loki:2.8.0
    container_name: app-gpu-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./docker/loki.yml:/etc/loki/local-config.yaml:ro
    networks:
      - app-gpu-network

  # Promtail - Log Collection
  promtail:
    image: grafana/promtail:2.8.0
    container_name: app-gpu-promtail
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs:ro
      - /var/log:/var/log:ro
      - ./docker/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-gpu-network
    depends_on:
      - loki

#==============================================================================
# Networks
#==============================================================================
networks:
  app-gpu-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

#==============================================================================
# Volumes
#==============================================================================
volumes:
  nats_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

#==============================================================================
# Production Deployment Notes
#==============================================================================
# 
# Prerequisites:
# 1. Install Docker Engine 24.0+ with Compose V2
# 2. Install NVIDIA Container Toolkit
# 3. Configure nvidia-docker runtime
# 
# Deploy:
# docker compose up -d
# 
# Monitor:
# - App health: http://localhost:9090/health
# - Metrics: http://localhost:9090/metrics  
# - Grafana: http://localhost:3000 (admin/admin123)
# - Prometheus: http://localhost:9091
# - NATS monitoring: http://localhost:8222
# 
# Scale workers:
# docker compose up -d --scale app-gpu=3
# 
# Update:
# docker compose pull && docker compose up -d
# 
# Logs:
# docker compose logs -f app-gpu
# 
# Stop:
# docker compose down
#
